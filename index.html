// ---------- persistent login (7 days) ----------
// Uses real browser localStorage since this needs to survive closing the tab/browser.
// Note: localStorage is disabled inside the Claude artifact preview sandbox, so this
// only actually persists once the site is deployed for real (e.g. on GitHub Pages).

const SESSION_KEY = "agencyos_session";
const SESSION_DAYS = 7;

function loadSavedSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed.expiresAt || parsed.expiresAt < Date.now()) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return { role: parsed.role, name: parsed.name, agency: parsed.agency };
  } catch {
    return null;
  }
}

function saveSession(session) {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      ...session,
      expiresAt: Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000,
    }));
  } catch {
    // localStorage unavailable (e.g. inside the Claude preview sandbox) — session just won't persist here.
  }
}

function clearSavedSession() {
  try {
    localStorage.removeItem(SESSION_KEY);
  } catch {}
}

function App() {
  const { value: cards, loading: cardsLoading, persist: persistCards } = usePersisted("pipeline:cards", []);
  const { value: models, loading: modelsLoading, persist: persistModels } = usePersisted("pipeline:models", [
    { name: "Anna", note: "", pin: "", onboarded: false, agency: "CZ", addedAt: Date.now() },
    { name: "Vivien", note: "", pin: "", onboarded: false, agency: "CZ", addedAt: Date.now() },
    { name: "Kuro", note: "", pin: "", onboarded: false, agency: "CZ", addedAt: Date.now() },
    { name: "Lucie", note: "", pin: "", onboarded: false, agency: "CZ", addedAt: Date.now() },
    { name: "model", note: "Testing account", pin: "model", onboarded: false, alwaysOnboard: true, agency: "CZ", addedAt: Date.now() },
  ]);
  const { value: tasks, loading: tasksLoading, persist: persistTasks } = usePersisted("pipeline:tasks", []);
  const { value: stats, loading: statsLoading, persist: persistStats } = usePersisted("pipeline:stats", []);
  const { value: reels, loading: reelsLoading, persist: persistReels } = usePersisted("pipeline:reels", []);
  const { value: trends, loading: trendsLoading, persist: persistTrends } = usePersisted("pipeline:trends", []);
  const { value: bufferDailyStats, loading: bufferDailyStatsLoading } = usePersisted("pipeline:bufferDailyStats", []);
  const { value: settings, loading: settingsLoading, persist: persistSettings } = usePersisted("pipeline:settings", { adminPinCZ: "2748", adminPinUS: "1234" });
  const { value: integrations, loading: integrationsLoading, persist: persistIntegrations } = usePersisted("pipeline:integrations", DEFAULT_INTEGRATIONS);
  const [session, setSession] = useState(() => loadSavedSession());
  const [view, setView] = useState(null);
  const [onboardingDismissed, setOnboardingDismissed] = useState(false);
  const loading = cardsLoading || modelsLoading || tasksLoading || settingsLoading || statsLoading || reelsLoading || trendsLoading || integrationsLoading;

  if (loading) {
    return (
      <div className="min-h-screen c-bg-app flex items-center justify-center">
        <Loader2 className="animate-spin c-muted" size={20} />
      </div>
    );
  }

  if (!session) {
    return (
      <LoginScreen
        models={models}
        settings={settings}
        onLogin={(s) => { saveSession(s); setSession(s); setView("dashboard"); setOnboardingDismissed(false); }}
        onRegisterPassword={async (name, password) => {
          await persistModels(models.map((m) => (m.name === name ? { ...m, pin: password } : m)));
        }}
      />
    );
  }

  if (session.role === "creator" && !onboardingDismissed) {
    const record = models.find((m) => m.name === session.name);
    if (record && (!record.onboarded || record.alwaysOnboard)) {
      return (
        <OnboardingScreen
          name={session.name}
          url={CREATOR_BIBLE_URL}
          onContinue={async () => {
            setOnboardingDismissed(true);
            await persistModels(models.map((m) => (m.name === session.name ? { ...m, onboarded: true } : m)));
          }}
          onQuestionnaireReceived={async (text) => {
            await persistModels(models.map((m) => (m.name === session.name ? { ...m, bio: text, bioReceivedAt: Date.now() } : m)));
          }}
        />
      );
    }
  }

  const NAV = session.role === "admin" ? NAV_ADMIN : NAV_CREATOR;
  const restrictModel = session.role === "creator" ? session.name : undefined;
  const currentView = view || "dashboard";

  const isAdmin = session.role === "admin";
  const agencyModels = isAdmin ? models.filter((m) => (m.agency || "CZ") === session.agency) : models;
  const agencyModelNameSet = new Set(agencyModels.map((m) => m.name));

  const scopedCards = isAdmin ? cards.filter((c) => agencyModelNameSet.has(c.model)) : cards;
  const scopedTasks = isAdmin ? tasks.filter((t) => agencyModelNameSet.has(t.model)) : tasks;
  const scopedStats = isAdmin ? stats.filter((s) => agencyModelNameSet.has(s.model)) : stats;
  const scopedReels = isAdmin ? reels.filter((r) => agencyModelNameSet.has(r.model)) : reels;
  // trends are shared/global — Team manages the same list from either login, choosing per-trend who sees it

  const scopedPersistCards = isAdmin
    ? async (next) => persistCards([...cards.filter((c) => !agencyModelNameSet.has(c.model)), ...next])
    : persistCards;
  const scopedPersistTasks = isAdmin
    ? async (next) => persistTasks([...tasks.filter((t) => !agencyModelNameSet.has(t.model)), ...next])
    : persistTasks;
  const scopedPersistStats = isAdmin
    ? async (next) => persistStats([...stats.filter((s) => !agencyModelNameSet.has(s.model)), ...next])
    : persistStats;
  const scopedPersistReels = isAdmin
    ? async (next) => persistReels([...reels.filter((r) => !agencyModelNameSet.has(r.model)), ...next])
    : persistReels;
  const scopedPersistModels = isAdmin
    ? async (next) => persistModels([...models.filter((m) => (m.agency || "CZ") !== session.agency), ...next])
    : persistModels;
  const scopedPersistIntegrations = isAdmin
    ? async (next) => {
        const currentList = integrations && integrations.length ? integrations : DEFAULT_INTEGRATIONS;
        const otherAgencyItems = currentList.filter((i) => (i.agency || "CZ") !== session.agency);
        await persistIntegrations([...otherAgencyItems, ...next]);
      }
    : persistIntegrations;

  return (
    <div className="min-h-screen c-bg-app flex flex-col" style={{ fontFamily: "Inter, sans-serif" }}>
      <style>{fontImport}</style>

      {/* Desktop full-width top bar */}
      <div className="hidden md:flex items-center justify-between px-4 py-3 border-b c-border c-bg-panel flex-shrink-0">
        <div className="flex items-center gap-2">
          <Clapperboard size={18} className="c-accent" />
          <span className="text-lg font-extrabold tracking-tight c-text">
            AGENCY OS
          </span>
        </div>
        <div className="flex items-center gap-1.5">
          {session.role === "admin" && (
            <button onClick={() => setView("settings")} title="Settings"
              className="p-1.5 rounded-lg c-muted hover-text-primary hover-bg-surface transition-colors">
              <Settings size={15} />
            </button>
          )}
          {session.role === "creator" && (
            <NotificationBell model={models.find((m) => m.name === session.name)} cards={cards} tasks={tasks} trends={trends}
              agency={session.agency} models={models} persistModels={persistModels} onNavigate={setView} />
          )}
          <div className="flex items-center gap-2 pl-1">
            <div title={`${session.name} — ${session.agency}`} className="w-7 h-7 rounded-full c-bg-accent c-onaccent flex items-center justify-center fs-12 font-mono font-bold flex-shrink-0">
              {(session.name || "?").slice(0, 1).toUpperCase()}
            </div>
            <div className="leading-tight">
              <div className="fs-12 font-semibold c-text">{session.name}</div>
              <div className="fs-9 font-mono uppercase tracking-wide c-faint">{session.agency} {session.role === "admin" ? "team" : ""}</div>
            </div>
          </div>
          <button onClick={() => { clearSavedSession(); setSession(null); setView(null); setOnboardingDismissed(false); }}
            title="Sign out" className="p-1.5 rounded-lg c-muted hover-warn hover-bg-surface transition-colors ml-1">
            <LogOut size={15} />
          </button>
        </div>
      </div>

      <div className="flex flex-1 min-h-0">
        {/* Desktop sidebar */}
        <aside className="hidden md:flex w-56 border-r c-border c-bg-panel flex-shrink-0 flex-col">
          <nav className="flex-1 px-2 py-3 space-y-1">
            {NAV.map((n) => {
              const Icon = n.icon;
              const activeNav = currentView === n.id;
              return (
                <button key={n.id} onClick={() => setView(n.id)}
                  className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-lg fs-13 transition-colors ${activeNav ? "c-bg-accent-a1 c-accent" : "c-muted hover-bg-surface hover-text-primary"}`}>
                  <Icon size={15} />
                  {n.label}
                </button>
              );
            })}
          </nav>
          <div className="px-4 py-3 border-t c-border">
            <div className="flex items-center gap-2">
              <Circle size={7} fill="#6FB07F" color="#6FB07F" className="anim-pulse-dot" />
              <span className="fs-10 font-mono uppercase tracking-widest c-muted">All systems online</span>
            </div>
          </div>
        </aside>

        <div className="flex-1 flex flex-col min-w-0">
          {/* Mobile top bar */}
          <div className="md:hidden flex items-center justify-between px-4 py-3 border-b c-border c-bg-panel sticky top-0 z-30">
            <div className="flex items-center gap-2">
              <Clapperboard size={17} className="c-accent" />
              <span className="text-lg font-extrabold tracking-tight c-text">
                AGENCY OS
              </span>
            </div>
            <div className="flex items-center gap-1.5">
              {session.role === "admin" && (
                <button onClick={() => setView("settings")} title="Settings" className="c-muted p-1.5" aria-label="Settings">
                  <Settings size={16} />
                </button>
              )}
              {session.role === "creator" && (
                <NotificationBell model={models.find((m) => m.name === session.name)} cards={cards} tasks={tasks} trends={trends}
                  agency={session.agency} models={models} persistModels={persistModels} onNavigate={setView} />
              )}
              <div className="w-6 h-6 rounded-full c-bg-accent c-onaccent flex items-center justify-center fs-11 font-mono font-bold">
                {(session.name || "?").slice(0, 1).toUpperCase()}
              </div>
              <button onClick={() => { clearSavedSession(); setSession(null); setView(null); setOnboardingDismissed(false); }} className="c-muted p-1.5" aria-label="Sign out">
                <LogOut size={17} />
              </button>
            </div>
          </div>

          <main key={currentView} className="flex-1 px-4 md:px-6 py-4 md:py-6 overflow-x-hidden pb-24 md:pb-6 anim-view">
            <div className="mb-5 md:mb-6">
              <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight c-text">
                {NAV.find((n) => n.id === currentView)?.label}
              </h1>
            </div>

            {currentView === "dashboard" && (session.role === "admin"
              ? <Dashboard cards={scopedCards} models={agencyModels} stats={scopedStats} reels={scopedReels} onNavigate={setView} />
              : <CreatorDashboard stats={stats} tasks={tasks} restrictModel={restrictModel} onNavigate={setView} bufferDailyStats={bufferDailyStats} />)}
            {currentView === "content" && <ContentDirector cards={isAdmin ? scopedCards : cards} persistCards={isAdmin ? scopedPersistCards : persistCards} models={isAdmin ? agencyModels : models} restrictModel={restrictModel} />}
            {currentView === "calendar" && <CalendarView cards={isAdmin ? scopedCards : cards} tasks={isAdmin ? scopedTasks : tasks} onNavigate={setView} restrictModel={restrictModel} />}
            {currentView === "tasks" && <TaskManager tasks={isAdmin ? scopedTasks : tasks} persistTasks={isAdmin ? scopedPersistTasks : persistTasks} models={isAdmin ? agencyModels : models} restrictModel={restrictModel} />}
            {currentView === "stats" && <StatsManager stats={scopedStats} persistStats={scopedPersistStats} models={agencyModels} reels={scopedReels} persistReels={scopedPersistReels} />}
            {currentView === "trends" && <TrendManager trends={trends} persistTrends={persistTrends} />}
            {currentView === "neo" && <NeoPage agency={session.agency} session={session} onNavigate={setView}
              onSignOut={() => { clearSavedSession(); setSession(null); setView(null); setOnboardingDismissed(false); }}
              cards={scopedCards} tasks={scopedTasks} models={agencyModels} stats={scopedStats} reels={scopedReels} trends={trends} />}
            {currentView === "trending" && <CreatorTrending trends={trends} agency={session.agency} />}
            {currentView === "models" && <ModelManager models={agencyModels} persistModels={scopedPersistModels} cards={scopedCards} agency={session.agency} />}
            {currentView === "settings" && <SettingsPanel settings={settings} persistSettings={persistSettings} integrations={integrations} persistIntegrations={scopedPersistIntegrations} agency={session.agency} />}
          </main>
        </div>
      </div>

      {/* Mobile bottom tab bar */}
      <nav className="md:hidden fixed bottom-0 inset-x-0 z-40 c-bg-panel border-t c-border flex overflow-x-auto">
        {NAV.map((n) => {
          const Icon = n.icon;
          const activeNav = currentView === n.id;
          return (
            <button key={n.id} onClick={() => setView(n.id)}
              className={`flex-1 minw-64 flex flex-col items-center gap-1 py-2.5 ${activeNav ? "c-accent" : "c-muted"}`}>
              <Icon size={17} />
              <span className="fs-9 font-mono uppercase tracking-wide leading-none text-center px-0.5">{n.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

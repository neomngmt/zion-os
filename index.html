        style, ...rest,
      },
      elements.map(([tag, props], i) => React.createElement(tag, { key: i, ...props }))

  };
}

if (!window.storage) {
  window.storage = {
    async get(key) {
      const cfg = TABLES[key];
      if (!cfg) return null;
      try {
        if (cfg.mode === "singleton") {
          const { data, error } = await supabaseClient.from(cfg.table).select("*").eq("id", 1).maybeSingle();
          if (error || !data) return null;
          return { key, value: JSON.stringify(cfg.fromDb(data)) };
        }
        const { data, error } = await supabaseClient.from(cfg.table).select("*");
        if (error) { console.error("storage.get", key, error); return null; }
        return { key, value: JSON.stringify((data || []).map(cfg.fromDb)) };
      } catch (e) { console.error("storage.get threw", key, e); return null; }
    },
    async set(key, value) {
      const cfg = TABLES[key];
      if (!cfg) return null;
      try {
        const parsed = JSON.parse(value);
        if (cfg.mode === "singleton") {
          const { error } = await supabaseClient.from(cfg.table).upsert(cfg.toDb(parsed));
          if (error) { console.error("storage.set", key, error); return null; }
          return { key, value };
        }
        const rows = parsed.map(cfg.toDb);
        if (rows.length) {
          const { error } = await supabaseClient.from(cfg.table).upsert(rows);
          if (error) { console.error("storage.set upsert", key, error); return null; }
        }
        // Remove rows that are no longer present in the current array (handles deletes).
        const { data: existing } = await supabaseClient.from(cfg.table).select(cfg.idKey);
        const currentIds = new Set(rows.map((r) => r[cfg.idKey]));
        const toDelete = (existing || []).map((r) => r[cfg.idKey]).filter((id) => !currentIds.has(id));
        if (toDelete.length) {
          await supabaseClient.from(cfg.table).delete().in(cfg.idKey, toDelete);
        }
        return { key, value };
      } catch (e) { console.error("storage.set threw", key, e); return null; }
    },
    async delete(key) {
      const cfg = TABLES[key];
      if (!cfg) return null;
      try {
        if (cfg.mode === "singleton") await supabaseClient.from(cfg.table).delete().eq("id", 1);
        else await supabaseClient.from(cfg.table).delete().neq(cfg.idKey, "__none__");
        return { key, deleted: true };
      } catch { return null; }
    },
    async list() { return { keys: Object.keys(TABLES) }; },
  };
}

// ---------- storage hooks ----------

function usePersisted(key, fallback, shared = true) {
  const [value, setValue] = useState(fallback);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const res = await window.storage.get(key, shared);
      setValue(res ? JSON.parse(res.value) : fallback);
    } catch {
      setValue(fallback);
    }
    setLoading(false);
  }, [key, shared]);

  useEffect(() => { load(); }, [load]);

  const persist = async (next) => {
    setValue(next);
    try {
      await window.storage.set(key, JSON.stringify(next), shared);
    } catch (e) {
      console.error("save failed", e);
    }
  };

  return { value, loading, persist };
}

function CountUp({ value, prefix = "", duration = 600 }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    let raf;
    const start = performance.now();
    const from = 0;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(Math.round(from + (value - from) * eased));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <>{prefix}{display.toLocaleString()}</>;
}

  );
}

function ContentDirector({ cards, persistCards, models, restrictModel }) {
  const [detail, setDetail] = useState(null);
  const [adding, setAdding] = useState(false);
  const [newTitle, setNewTitle] = useState("");
  const [newModel, setNewModel] = useState(restrictModel || "");
  const [newPlatform, setNewPlatform] = useState("ig");
  const [filter, setFilter] = useState(restrictModel || "all");
  const [network, setNetwork] = useState(null); // null = show the platform picker popup first

  const nextSeq = () => (cards.reduce((m, c) => Math.max(m, c.seq || 0), 0) + 1);

  const addCard = async () => {
    if (!newTitle.trim()) return;
    const card = {
      id: uid(), seq: nextSeq(), title: newTitle, model: restrictModel || newModel, sceneType: "",
      platform: newPlatform, location: "", deadline: "", assignee: "", scriptLink: "", notes: "",
      stage: "idea", source: restrictModel ? "creator" : "team", createdAt: Date.now(),
    };
    await persistCards([...cards, card]);
    setNewTitle(""); setNewModel(restrictModel || ""); setNewPlatform("ig"); setAdding(false);
  };

  const advance = async (id, stageId) => {
    await persistCards(cards.map((c) => (c.id === id ? { ...c, stage: stageId } : c)));
  };
  const saveCard = async (updated) => {
    await persistCards(cards.map((c) => (c.id === updated.id ? updated : c)));
    setDetail(null);
  };
  const deleteCard = async (id) => {
    await persistCards(cards.filter((c) => c.id !== id));
    setDetail(null);
  };

  const byModel = filter === "all" ? cards : cards.filter((c) => c.model === filter);
  const visible = !network || network === "all" ? byModel : byModel.filter((c) => (c.platform || "ig") === network);
  const countFor = (netId) => (netId === "all" ? byModel.length : byModel.filter((c) => (c.platform || "ig") === netId).length);

  // Platform picker: shown first, every time this page is opened, before
  // any board is visible — clicking a platform below opens that platform's
  // Content Director. "All" opens the combined view like before.
  if (!network) {
    return (
      <div className="flex items-center justify-center" style={{ minHeight: "60vh" }}>
        <div className="w-full max-w-md">
          <div className="fs-10 uppercase tracking-widest c-faint font-mono mb-1 text-center">Content Director</div>
          <div className="text-xl font-extrabold c-text text-center mb-6">Which platform?</div>
          <div className="space-y-2">
            {PLATFORMS.map((p) => {
              const Icon = p.icon === "Instagram" ? Instagram : p.icon === "Flame" ? Flame : X;
              const count = countFor(p.id);
              return (
                <button key={p.id} onClick={() => setNetwork(p.id)}
                  className="w-full flex items-center justify-between px-4 py-3.5 rounded-xl border c-border c-bg-surface hover-bg-accent-a1 transition-colors">
                  <span className="flex items-center gap-2.5 font-mono fs-13 c-text font-semibold"><Icon size={15} className="c-accent" />{p.label}</span>
                  <span className="fs-11 font-mono c-faint">{count} scene{count === 1 ? "" : "s"}</span>
                </button>
              );
            })}
            <button onClick={() => setNetwork("all")}
              className="w-full text-center px-4 py-2.5 rounded-xl fs-11 font-mono uppercase tracking-wide c-muted hover-bg-surface transition-colors">
              or see everything at once →
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="flex gap-5">
      <div className="minw-140 w-140 flex-shrink-0 hidden md:block">
        <button onClick={() => setNetwork(null)}
          className="w-full flex items-center gap-1.5 fs-10 font-mono uppercase tracking-wide c-muted hover-bg-surface px-3 py-2 rounded-lg mb-3">
          <ChevronLeft size={12} /> Switch platform

        <div className="fs-10 uppercase tracking-widest c-faint font-mono mb-2 px-1">Network</div>

          <button onClick={() => setNetwork("all")}

            return (

          )}
          <button onClick={addCard} className="px-3 py-2 rounded-lg c-bg-accent c-onaccent text-xs font-mono uppercase font-semibold">Add</button>
          <button onClick={() => setAdding(false)} className="px-3 py-2 rounded-lg border c-border c-muted text-xs font-mono uppercase">Cancel</button>
        </div>
      )}

      <div className="flex gap-3 overflow-x-auto pb-4 snap-x snap-proximity -mx-4 px-4 md:mx-0 md:px-0">
        {STAGES.map((stage) => {
          const stageCards = visible.filter((c) => c.stage === stage.id);
          return (
            <div key={stage.id} className="minw-240 w-240 flex-shrink-0 snap-start">
              <div className="flex items-center gap-2 mb-3 pb-2 border-b" style={{ borderColor: stage.color + "55" }}>
                <span className="font-mono fs-10" style={{ color: stage.color }}>{stage.code}</span>
                <span className="fs-11 uppercase tracking-widest font-semibold" style={{ color: stage.color }}>{stage.label}</span>
                <span className="ml-auto fs-10 font-mono c-muted">{stageCards.length}</span>
              </div>
              {stageCards.length === 0 && (
                <div className="fs-11 c-faint font-mono italic py-6 text-center border border-dashed c-border rounded-xl">empty</div>
              )}
              {stageCards.map((card) => (
                <CardTile key={card.id} card={card} onAdvance={advance} onDelete={deleteCard} onOpen={setDetail} />
              ))}
            </div>
          );
        })}
      </div>

      {detail && <CardDetail card={detail} models={models} restrictModel={restrictModel} onClose={() => setDetail(null)} onSave={saveCard} onDelete={deleteCard} />}
      </div>
    </div>
  );
}

function ModelManager({ models, persistModels, cards, agency }) {
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState("");
  const [note, setNote] = useState("");
  const [pin, setPin] = useState("");
  const [detailName, setDetailName] = useState(null);

  const addModel = async () => {
    if (!name.trim()) return;
    await persistModels([...models, {
      name: name.trim(), note, pin: pin.trim(), onboarded: false, addedAt: Date.now(), agency: agency || "CZ",
      igHandle: "", xHandle: "", tiktokHandle: "", ofUrl: "", driveUrl: "", bio: "",
    }]);
    setName(""); setNote(""); setPin(""); setAdding(false);
  };
  const removeModel = async (n) => {
    await persistModels(models.filter((m) => m.name !== n));
  };
  const setModelPin = async (n, newPin) => {
    await persistModels(models.map((m) => (m.name === n ? { ...m, pin: newPin } : m)));
  };
  const toggleAlwaysOnboard = async (n) => {
    await persistModels(models.map((m) => (m.name === n ? { ...m, alwaysOnboard: !m.alwaysOnboard } : m)));
  };
  const saveDetail = async (updated) => {
    await persistModels(models.map((m) => (m.name === updated.name ? updated : m)));
    setDetailName(null);
  };

  const detailModel = models.find((m) => m.name === detailName);

  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <p className="c-muted text-sm">Roster, socials, Drive links, and completed questionnaires.</p>
        <button onClick={() => setAdding(true)}

        <div className="mb-5 c-bg-surface border c-border rounded-xl p-3 flex gap-2 flex-wrap">

            className="flex-1 minw-160 c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none focus-border-accent" />
          <input value={pin} onChange={(e) => setPin(e.target.value)} placeholder="Password (optional)"
            className="w-36 c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none focus-border-accent" />
          <button onClick={addModel} className="px-3 py-2 rounded-lg c-bg-accent c-onaccent text-xs font-mono uppercase font-semibold">Add</button>
          <button onClick={() => setAdding(false)} className="px-3 py-2 rounded-lg border c-border c-muted text-xs font-mono uppercase">Cancel</button>
        </div>
      )}

      {models.length === 0 && (
        <div className="fs-12 c-faint font-mono italic py-10 text-center border border-dashed c-border rounded-xl">
          no models yet — add your first one
        </div>
      )}

      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        {models.map((m) => {
          const own = cards.filter((c) => c.model === m.name);
          const active = own.filter((c) => c.stage !== "posted").length;
          const posted = own.filter((c) => c.stage === "posted").length;
          return (
            <div key={m.name} className="c-bg-surface border c-border rounded-xl p-4 group relative cursor-pointer hover-border-accent hover-lift"
              onClick={() => setDetailName(m.name)}>
              <button onClick={(e) => { e.stopPropagation(); removeModel(m.name); }}
                className="absolute top-3 right-3 opacity-0 group-hover:opacity-100 c-muted hover-warn transition-opacity">
                <Trash2 size={13} />
              </button>
              <div className="flex items-center gap-2.5 mb-2">
                <UserCircle2 size={20} className="c-accent" />
                <div className="c-text font-medium text-sm">{m.name}</div>
              </div>
              {m.note && <div className="c-muted text-xs mb-3">{m.note}</div>}
              <div className="flex gap-4 font-mono fs-11 c-muted mb-3">

  );

function CreatorForm({ models, cards, persistCards, restrictModel }) {
  const [model, setModel] = useState(restrictModel || "");

  const [sceneType, setSceneType] = useState("");
  const [location, setLocation] = useState("");
  const [notes, setNotes] = useState("");
  const [sent, setSent] = useState(false);

  const nextSeq = () => (cards.reduce((m, c) => Math.max(m, c.seq || 0), 0) + 1);

  const submit = async () => {
    const chosenModel = restrictModel || model;
    if (!chosenModel || !title.trim()) return;
    const card = {
      id: uid(), seq: nextSeq(), title, model: chosenModel, sceneType, location,
      deadline: "", assignee: "", scriptLink: "", notes,
      stage: "idea", source: "creator", createdAt: Date.now(),
    };
    await persistCards([...cards, card]);
    setSent(true);
    setTitle(""); setSceneType(""); setLocation(""); setNotes("");
    setTimeout(() => setSent(false), 2500);

  return (
    <div className="max-w-md">

        </>
      )}

      <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">What do you want to shoot?</label>
      <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="e.g. cooking breakfast, morning routine bit..."

      <div className="grid grid-cols-2 gap-3 mb-3">
        <div>
          <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">Vibe / type</label>
          <input value={sceneType} onChange={(e) => setSceneType(e.target.value)} placeholder="girl next door..."
            className="w-full c-bg-surface border c-border rounded-lg px-2.5 py-2.5 text-sm c-text outline-none focus-border-accent" />
        </div>
        <div>
          <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">Where</label>

        className="w-full c-bg-surface border c-border rounded-lg px-2.5 py-2.5 text-sm c-text mb-4 outline-none focus-border-accent resize-none" />

      <button onClick={submit}

    </div>
  );
}

// ---------- dashboard ----------

function Dashboard({ cards, models, stats, reels, onNavigate }) {
  const activeCount = cards.filter((c) => c.stage !== "posted").length;
  const filmingToday = cards.filter((c) => c.stage === "filming").length;
  const pendingIdeas = cards.filter((c) => c.stage === "idea" && c.source === "creator").length;
  const recent = [...cards].sort((a, b) => b.createdAt - a.createdAt).slice(0, 6);

  // Latest weekly entry per model, summed for total agency revenue
  const latestPerModel = models.map((m) => {
    const own = stats.filter((s) => s.model === m.name).sort((a, b) => b.weekOf.localeCompare(a.weekOf));
    return own[0];
  }).filter(Boolean);
  const totalRevenue = latestPerModel.reduce((sum, s) => sum + (s.ofEarnings || 0), 0);
  const mostRecentWeek = latestPerModel.length ? latestPerModel.map((s) => s.weekOf).sort().slice(-1)[0] : null;
  const prevWeekTotal = mostRecentWeek
    ? models.reduce((sum, m) => {
        const own = stats.filter((s) => s.model === m.name && s.weekOf < mostRecentWeek).sort((a, b) => b.weekOf.localeCompare(a.weekOf));
        return sum + (own[0]?.ofEarnings || 0);
      }, 0)
    : null;

  // Best reel from the most recent week that has any reels logged
  const latestReelWeek = reels.length ? [...reels].map((r) => r.weekOf).sort().slice(-1)[0] : null;
  const reelOfWeek = latestReelWeek
    ? reels.filter((r) => r.weekOf === latestReelWeek).sort((a, b) => b.views - a.views)[0]
    : null;

  return (
    <div>
      <div className="c-bg-surface border c-border rounded-xl p-5 mb-6">
        <div className="flex items-center justify-between mb-1">
          <span className="fs-11 uppercase tracking-widest c-muted font-mono">Agency weekly revenue</span>
          {mostRecentWeek && <DeltaTag current={totalRevenue} previous={prevWeekTotal} />}
        </div>
        {latestPerModel.length === 0 ? (
          <div className="fs-12 c-faint font-mono italic py-4">No stats logged yet, add weekly entries in Stats.</div>
        ) : (
          <>
            <div className="text-4xl md:text-5xl font-extrabold c-accent mb-1">$<CountUp value={totalRevenue} /></div>
            <div className="fs-11 c-faint font-mono">across {latestPerModel.length} model{latestPerModel.length === 1 ? "" : "s"}, week of {fmtDay(mostRecentWeek)}</div>
          </>
        )}
      </div>

      <div className="flex gap-3 flex-wrap mb-6">
        <StatCard label="Active scenes" value={activeCount} color="#12b34c" />
        <StatCard label="In filming" value={filmingToday} color="#E2725B" />
        <StatCard label="Ideas to review" value={pendingIdeas} color="#8B93A1" />
        <StatCard label="Models" value={models.length} color="#f2f5f0" />
      </div>

      <div className="c-bg-surface border c-border rounded-xl p-4 mb-6">
        <div className="flex items-center justify-between mb-3">
          <span className="fs-11 uppercase tracking-widest c-muted font-mono">Reel of the week</span>
          <button onClick={() => onNavigate("stats")} className="fs-11 font-mono uppercase c-accent hover:underline">Log a reel →</button>
        </div>
        {!reelOfWeek ? (
          <div className="fs-12 c-faint font-mono italic py-4">No reels logged yet, add them in Stats.</div>
        ) : (
          <div>
            <div className="flex items-center gap-2 mb-2">
              <span className="c-text text-sm font-medium">{reelOfWeek.title || "Untitled reel"}</span>
              <span className="fs-10 font-mono c-accent uppercase">{reelOfWeek.model}</span>
            </div>
            <div className="flex gap-5 flex-wrap fs-11 font-mono c-muted mb-2">
              <span><span className="c-text">{reelOfWeek.views.toLocaleString()}</span> views</span>
              <span><span className="c-text">{reelOfWeek.likes.toLocaleString()}</span> likes</span>
              <span><span className="c-text">{reelOfWeek.shares.toLocaleString()}</span> shares</span>
              <span><span className="c-text">{reelOfWeek.comments.toLocaleString()}</span> comments</span>
            </div>
            {reelOfWeek.link && (
              <a href={reelOfWeek.link} target="_blank" rel="noopener noreferrer" className="fs-11 font-mono c-accent hover-accent-text">Open reel →</a>
            )}
          </div>
        )}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
        <div className="lg:col-span-3 c-bg-surface border c-border rounded-xl p-4">
          <div className="flex items-center justify-between mb-3">
            <span className="fs-11 uppercase tracking-widest c-muted font-mono">Pipeline snapshot</span>
            <button onClick={() => onNavigate("content")} className="fs-11 font-mono uppercase c-accent hover:underline">Open board →</button>
          </div>
          <div className="space-y-2.5">
            {STAGES.map((s) => {
              const n = cards.filter((c) => c.stage === s.id).length;
              const max = Math.max(1, cards.length);
              return (
                <div key={s.id} className="flex items-center gap-3">
                  <span className="fs-10 font-mono w-16" style={{ color: s.color }}>{s.label}</span>
                  <div className="flex-1 h-2 c-bg-app rounded-full overflow-hidden">
                    <div className="h-full rounded-full" style={{ width: `${(n / max) * 100}%`, backgroundColor: s.color }} />
                  </div>
                  <span className="fs-11 font-mono c-muted w-5 text-right">{n}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div className="lg:col-span-2 c-bg-surface border c-border rounded-xl p-4">
          <div className="flex items-center justify-between mb-3">
            <span className="fs-11 uppercase tracking-widest c-muted font-mono">Recent activity</span>
          </div>
          {recent.length === 0 ? (
            <div className="fs-11 c-faint font-mono italic py-6 text-center">nothing yet</div>
          ) : (
            <div className="space-y-2">
              {recent.map((c) => {
                const stage = STAGES.find((s) => s.id === c.stage);
                return (
                  <div key={c.id} className="flex items-center gap-2 text-xs">
                    <Circle size={6} fill={stage.color} color={stage.color} />
                    <span className="c-text truncate flex-1">{c.title || "Untitled"}</span>
                    <span className="c-muted font-mono fs-10">{c.model || "—"}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------- date helpers ----------

const toISO = (d) => d.toISOString().slice(0, 10);
const todayISO = () => toISO(new Date());
const addDays = (iso, n) => {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + n);
  return toISO(d);
};
const fmtDay = (iso) => {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
};

// ---------- tasks ----------

function TaskManager({ tasks, persistTasks, models, restrictModel }) {
  const [adding, setAdding] = useState(false);
  const [title, setTitle] = useState("");
  const [model, setModel] = useState(restrictModel || "");
  const [assignee, setAssignee] = useState("");
  const [dueDate, setDueDate] = useState(todayISO());
  const [recurring, setRecurring] = useState(false);
  const [filter, setFilter] = useState(restrictModel || "all");

  const nextSeq = () => (tasks.reduce((m, t) => Math.max(m, t.seq || 0), 0) + 1);

  const addTask = async () => {
    if (!title.trim()) return;
    const task = {
      id: uid(), seq: nextSeq(), title, model: restrictModel || model, assignee, dueDate, recurring,
      status: "todo", notes: "", createdAt: Date.now(),
    };
    await persistTasks([...tasks, task]);
    setTitle(""); setModel(restrictModel || ""); setAssignee(""); setDueDate(todayISO()); setRecurring(false); setAdding(false);
  };

  const toggleDone = async (task) => {
    const done = task.status !== "done";
    let next = tasks.map((t) => (t.id === task.id ? { ...t, status: done ? "done" : "todo" } : t));
    if (done && task.recurring) {
      next = [...next, {
        id: uid(), seq: nextSeq() + 1, title: task.title, model: task.model, assignee: task.assignee,
        dueDate: addDays(task.dueDate || todayISO(), 7), recurring: true,
        status: "todo", notes: task.notes, createdAt: Date.now(),
      }];
    }
    await persistTasks(next);
  };

  const deleteTask = async (id) => {
    await persistTasks(tasks.filter((t) => t.id !== id));
  };

  const visible = (filter === "all" ? tasks : tasks.filter((t) => t.model === filter))
    .sort((a, b) => (a.dueDate || "").localeCompare(b.dueDate || ""));
  const overdue = (t) => t.status !== "done" && t.dueDate && t.dueDate < todayISO();

  return (
    <div>
      <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
        {!restrictModel && (
          <div className="flex items-center gap-1.5 flex-wrap">
            <button onClick={() => setFilter("all")}
              className={`fs-11 font-mono uppercase px-2.5 py-1 rounded-lg border ${filter === "all" ? "c-border-accent c-accent" : "c-border c-muted"}`}>
              All
            </button>
            {models.map((m) => (
              <button key={m.name} onClick={() => setFilter(m.name)}
                className={`fs-11 font-mono uppercase px-2.5 py-1 rounded-lg border ${filter === m.name ? "c-border-accent c-accent" : "c-border c-muted"}`}>
                {m.name}
              </button>
            ))}
          </div>
        )}
        {restrictModel && <span className="fs-11 font-mono uppercase c-accent">{restrictModel}'s tasks</span>}
        <button onClick={() => setAdding(true)}
          className="flex items-center gap-1.5 fs-11 font-mono uppercase tracking-wide c-bg-accent c-onaccent px-3 py-1.5 rounded-lg font-semibold hover-bg-accent2">
          <Plus size={13} /> New task
        </button>
      </div>

      {adding && (
        <div className="mb-4 c-bg-surface border c-border rounded-xl p-3 flex gap-2 flex-wrap items-center">
          <input autoFocus value={title} onChange={(e) => setTitle(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && addTask()} placeholder="Task, e.g. upload weekly photo set..."
            className="flex-1 minw-180 c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none focus-border-accent" />
          {!restrictModel && (
            <select value={model} onChange={(e) => setModel(e.target.value)}
              className="c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none">
              <option value="">Model</option>
              {models.map((m) => <option key={m.name} value={m.name}>{m.name}</option>)}
            </select>
          )}
          <input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)}
            className="c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none" />
          {!restrictModel && (
            <input value={assignee} onChange={(e) => setAssignee(e.target.value)} placeholder="Assignee (Martin, chatter...)"
              className="minw-180 c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none focus-border-accent" />
          )}
          <label className="flex items-center gap-1.5 fs-11 font-mono uppercase c-muted">
            <input type="checkbox" checked={recurring} onChange={(e) => setRecurring(e.target.checked)} />
            weekly
          </label>
          <button onClick={addTask} className="px-3 py-2 rounded-lg c-bg-accent c-onaccent text-xs font-mono uppercase font-semibold">Add</button>
          <button onClick={() => setAdding(false)} className="px-3 py-2 rounded-lg border c-border c-muted text-xs font-mono uppercase">Cancel</button>
        </div>
      )}

      {visible.length === 0 ? (
        <div className="fs-12 c-faint font-mono italic py-10 text-center border border-dashed c-border rounded-xl">no tasks</div>
      ) : (
        <div className="space-y-2">
          {visible.map((t) => (
            <div key={t.id}
              className={`flex items-center gap-3 c-bg-surface border rounded-xl px-3 py-2.5 group ${t.status === "done" ? "c-border opacity-50" : overdue(t) ? "c-border-warn-a" : "c-border"}`}>
              <button onClick={() => toggleDone(t)} className="flex-shrink-0">
                <CheckCircle2 size={18} className={t.status === "done" ? "c-success" : "c-border2"} />
              </button>
              <div className="flex-1 min-w-0">
                <div className={`text-sm c-text ${t.status === "done" ? "line-through" : ""}`}>{t.title}</div>
                <div className="flex items-center gap-2 fs-10 font-mono c-muted mt-0.5">
                  {t.model && <span>{t.model}</span>}
                  {t.assignee && <span className="flex items-center gap-0.5"><User size={10} />{t.assignee}</span>}
                  {t.dueDate && <span className={overdue(t) ? "c-warn" : ""}>{fmtDay(t.dueDate)}</span>}
                  {t.recurring && <span className="flex items-center gap-0.5"><Repeat size={10} />weekly</span>}
                </div>
              </div>
              <button onClick={() => deleteTask(t.id)}
                className="opacity-0 group-hover:opacity-100 c-muted hover-warn transition-opacity flex-shrink-0">
                <Trash2 size={13} />
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- calendar ----------

function CalendarView({ cards, tasks, onNavigate, restrictModel }) {
  const [cursor, setCursor] = useState(() => {
    const t = new Date();
    return { year: t.getFullYear(), month: t.getMonth() };
  });
  const [selected, setSelected] = useState(todayISO());

  const first = new Date(cursor.year, cursor.month, 1);
  const startOffset = (first.getDay() + 6) % 7; // Monday-first
  const daysInMonth = new Date(cursor.year, cursor.month + 1, 0).getDate();
  const monthLabel = first.toLocaleDateString("en-US", { month: "long", year: "numeric" });

  const scopedCards = restrictModel ? cards.filter((c) => c.model === restrictModel) : cards;
  const scopedTasks = restrictModel ? tasks.filter((t) => t.model === restrictModel) : tasks;

  const itemsByDate = {};
  scopedCards.forEach((c) => {
    if (!c.deadline) return;
    (itemsByDate[c.deadline] ||= []).push({ type: "scene", label: c.title, color: STAGES.find((s) => s.id === c.stage)?.color, model: c.model });
  });
  scopedTasks.forEach((t) => {
    if (!t.dueDate || t.status === "done") return;
    (itemsByDate[t.dueDate] ||= []).push({ type: "task", label: t.title, color: "#8B93A1", model: t.model });
  });

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const shiftMonth = (delta) => {
    let m = cursor.month + delta, y = cursor.year;
    if (m < 0) { m = 11; y -= 1; } else if (m > 11) { m = 0; y += 1; }
    setCursor({ year: y, month: m });
  };

  const dayISO = (d) => `${cursor.year}-${String(cursor.month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  return (
    <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
      <div className="lg:col-span-3 c-bg-surface border c-border rounded-xl p-4">
        <div className="flex items-center justify-between mb-4">
          <span className="fs-13 c-text font-medium">{monthLabel}</span>
          <div className="flex gap-1">
            <button onClick={() => shiftMonth(-1)} className="p-1 rounded-lg border c-border c-muted hover-accent-text hover-border-accent"><ChevronLeft size={14} /></button>
            <button onClick={() => shiftMonth(1)} className="p-1 rounded-lg border c-border c-muted hover-accent-text hover-border-accent"><ChevronRight size={14} /></button>
          </div>
        </div>
        <div className="grid grid-cols-7 gap-1 mb-1">
          {["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"].map((d) => (
            <div key={d} className="fs-9 font-mono uppercase c-faint text-center py-1">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d, i) => {
            if (!d) return <div key={i} />;
            const iso = dayISO(d);
            const items = itemsByDate[iso] || [];
            const isToday = iso === todayISO();
            const isSelected = iso === selected;
            return (
              <button key={i} onClick={() => setSelected(iso)}
                className={`aspect-square rounded-lg border p-1 flex flex-col items-start text-left transition-colors ${isSelected ? "c-border-accent" : "c-border"} ${isToday ? "c-bg-accent-a0" : "hover-bg-app"}`}>
                <span className={`fs-10 font-mono ${isToday ? "c-accent" : "c-muted"}`}>{d}</span>
                <div className="flex flex-wrap gap-0.5 mt-auto">
                  {items.slice(0, 3).map((it, idx) => (
                    <span key={idx} style={{ backgroundColor: it.color }} className="w-1.5 h-1.5 rounded-full" />
                  ))}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div className="lg:col-span-2 c-bg-surface border c-border rounded-xl p-4">
        <div className="flex items-center justify-between mb-3">
          <span className="fs-11 uppercase tracking-widest c-muted font-mono">{fmtDay(selected) || "—"}</span>
          <button onClick={() => onNavigate("content")} className="fs-11 font-mono uppercase c-accent hover:underline">Board →</button>
        </div>
        {(itemsByDate[selected] || []).length === 0 ? (
          <div className="fs-11 c-faint font-mono italic py-6 text-center">nothing scheduled</div>
        ) : (
          <div className="space-y-2">
            {(itemsByDate[selected] || []).map((it, idx) => (
              <div key={idx} className="flex items-center gap-2 text-xs">
                {it.type === "task" ? <CheckSquare size={12} className="c-idea flex-shrink-0" /> : <Circle size={8} fill={it.color} color={it.color} className="flex-shrink-0" />}
                <span className="c-text truncate flex-1">{it.label || "Untitled"}</span>
                <span className="c-muted font-mono fs-10">{it.model || "—"}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function LandingPage({ onSignIn }) {
  const rootRef = useRef(null);
  const onSignInRef = useRef(onSignIn);
  onSignInRef.current = onSignIn;

  useEffect(() => {
    const root = rootRef.current;
    if (!root) return;
    const cleanups = [];

    // "Sign in" links/buttons trigger the real in-app login instead of navigating away.
    // Matched by visible text AND by the known marketing href, so this can never fall through to a real navigation.
    const signInEls = Array.from(root.querySelectorAll("a")).filter((a) => {
      const text = (a.textContent || "").trim().toLowerCase();
      const href = a.getAttribute("href") || "";
      return text === "sign in" || href.includes("neomngmt.github.io/agencyos");
    });
    const onSignInClick = (e) => {
      e.preventDefault();
      e.stopPropagation();
      onSignInRef.current();
    };
    signInEls.forEach((el) => el.addEventListener("click", onSignInClick));
    cleanups.push(() => signInEls.forEach((el) => el.removeEventListener("click", onSignInClick)));

    function mountTicker(elId, items, sep) {
      const el = root.querySelector("#" + elId);
      if (!el) return;
      const doubled = [...items, ...items];
      el.innerHTML = doubled.map((t) => `<span>${t}</span>`).join(sep ? `<span>${sep}</span>` : "");
    }
    mountTicker("floorTicker", [
      "VERTICAL \u00b7 <b>READY TO POST</b>",
      "CAPTION QUEUED \u00b7 REPOST WINDOW <b>OPEN</b>",
      "BUFFER SYNC COMPLETE \u00b7 <b>4/4 CHANNELS ALIVE</b> \u00b7 06:00",
      "TREND SCAN \u00b7 3 NEW SIGNALS RANKED",
      "REEL LOGGED \u00b7 TOP PERFORMER <b>FLAGGED</b>",
    ]);
    mountTicker("bandTicker", [
      "CONTENT DELIVERED <b>DAILY</b>",
      "IG \u00b7 X \u00b7 TIKTOK \u00b7 ONE BOARD",
      "BUILT BY A WORKING AGENCY \u00b7 <b>USED EVERY MORNING</b>",
      "340K+ FOLLOWERS TRACKED",
      "HUNDREDS OF REELS RANKED",
    ]);

    // sticky nav on scroll
    const navBar = root.querySelector("#navBar");
    const onScroll = () => navBar && navBar.classList.toggle("scrolled", window.scrollY > 8);
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    cleanups.push(() => window.removeEventListener("scroll", onScroll));

    // scroll reveal
    const revealEls = Array.from(root.querySelectorAll("[data-reveal]"));
    revealEls.forEach((el, i) => { el.style.transitionDelay = (i % 4) * 70 + "ms"; });
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("in-view");
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    revealEls.forEach((el) => revealObserver.observe(el));
    cleanups.push(() => revealObserver.disconnect());

    // count-up numbers
    function animateCount(el) {
      const target = parseInt(el.dataset.count, 10);
      if (isNaN(target)) return;
      const duration = 1100;
      const start = performance.now();
      function tick(now) {
        const p = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(target * eased).toLocaleString();
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
    const countEls = Array.from(root.querySelectorAll("[data-count]"));
    const countObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          animateCount(entry.target);
          countObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.4 });
    countEls.forEach((el) => countObserver.observe(el));
    cleanups.push(() => countObserver.disconnect());

    // tilt + spotlight on cards
    const tiltCards = Array.from(root.querySelectorAll(".tilt-card"));
    const tiltHandlers = tiltCards.map((card) => {
      const move = (e) => {
        const r = card.getBoundingClientRect();
        const x = e.clientX - r.left, y = e.clientY - r.top;
        const rx = ((y / r.height) - 0.5) * -6;
        const ry = ((x / r.width) - 0.5) * 6;
        card.style.transform = `perspective(700px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-3px)`;
        card.style.setProperty("--mx", x + "px");
        card.style.setProperty("--my", y + "px");
      };
      const leave = () => { card.style.transform = ""; };
      card.addEventListener("mousemove", move);
      card.addEventListener("mouseleave", leave);
      return { card, move, leave };
    });
    cleanups.push(() => tiltHandlers.forEach(({ card, move, leave }) => {
      card.removeEventListener("mousemove", move);
      card.removeEventListener("mouseleave", leave);
    }));

    // ambient cursor glow across the whole page (GPU-friendly: transform only, RAF-throttled)
    const pageGlow = root.querySelector("#pageGlow");
    if (pageGlow) {
      let glowRaf = null;
      let glowX = window.innerWidth / 2;
      let glowY = window.innerHeight * 0.2;
      const onMouseMoveGlow = (e) => {
        glowX = e.clientX;
        glowY = e.clientY;
        if (glowRaf) return;
        glowRaf = requestAnimationFrame(() => {
          pageGlow.style.transform = `translate3d(${glowX - 450}px, ${glowY - 450}px, 0)`;
          glowRaf = null;
        });
      };
      window.addEventListener("mousemove", onMouseMoveGlow, { passive: true });
      cleanups.push(() => {
        window.removeEventListener("mousemove", onMouseMoveGlow);
        if (glowRaf) cancelAnimationFrame(glowRaf);
      });
    }

    // scroll-driven connector line + dot (diagonal SVG path, supports forks)
    const connectors = Array.from(root.querySelectorAll(".connector"));
    const connectorPaths = new Map();
    connectors.forEach((c) => {
      c.querySelectorAll(".connector-path").forEach((p) => connectorPaths.set(p, p.getTotalLength()));
    });
    const updateConnectors = () => {
      const trigger = window.innerHeight * 0.82;
      connectors.forEach((c) => {
        const rect = c.getBoundingClientRect();
        const progress = Math.min(1, Math.max(0, (trigger - rect.top) / rect.height));
        const paths = c.querySelectorAll(".connector-path");
        const dots = c.querySelectorAll(".connector-dot");
        paths.forEach((path, i) => {
          const len = connectorPaths.get(path) || path.getTotalLength();
          path.style.strokeDasharray = len;
          path.style.strokeDashoffset = len * (1 - progress);
          const dot = dots[i];
          if (!dot) return;
          if (progress > 0.02) {
            const pt = path.getPointAtLength(len * progress);
            const vb = path.ownerSVGElement.viewBox.baseVal;
            dot.style.left = (pt.x / vb.width) * 100 + "%";
            dot.style.top = (pt.y / vb.height) * 100 + "%";
            dot.style.opacity = "1";
          } else {
            dot.style.opacity = "0";
          }
        });
        let target = c.nextElementSibling;
        while (target && !target.classList.contains("panel")) target = target.nextElementSibling;
        if (target) target.classList.toggle("connector-lit", progress >= 0.97);
      });
    };
    const onScrollConnectors = () => requestAnimationFrame(updateConnectors);
    window.addEventListener("scroll", onScrollConnectors, { passive: true });
    window.addEventListener("resize", updateConnectors);
    updateConnectors();
    cleanups.push(() => {
      window.removeEventListener("scroll", onScrollConnectors);
      window.removeEventListener("resize", updateConnectors);
    });

    // footer legal pages (Privacy / Terms / Status / Contact)
    const mainContentEl = root.querySelector("#mainContent");
    const legalPages = root.querySelectorAll(".legal-page");
    function showPage(name) {
      if (mainContentEl) mainContentEl.style.display = "none";
      legalPages.forEach((p) => p.classList.toggle("active", p.id === "page-" + name));
      window.scrollTo(0, 0);
    }
    function showMain() {
      if (mainContentEl) mainContentEl.style.display = "";
      legalPages.forEach((p) => p.classList.remove("active"));
      window.scrollTo(0, 0);
    }
    const pageLinks = Array.from(root.querySelectorAll("[data-page]"));
    const onPageLinkClick = function (e) { e.preventDefault(); showPage(this.dataset.page); };
    pageLinks.forEach((el) => el.addEventListener("click", onPageLinkClick));
    cleanups.push(() => pageLinks.forEach((el) => el.removeEventListener("click", onPageLinkClick)));

    const backLinks = Array.from(root.querySelectorAll(".legal-back"));
    const onBackClick = (e) => { e.preventDefault(); showMain(); };
    backLinks.forEach((el) => el.addEventListener("click", onBackClick));
    cleanups.push(() => backLinks.forEach((el) => el.removeEventListener("click", onBackClick)));

    const brandHome = root.querySelector("#brandHome");
    const onBrandClick = () => showMain();
    if (brandHome) {
      brandHome.addEventListener("click", onBrandClick);
      cleanups.push(() => brandHome.removeEventListener("click", onBrandClick));
    }

    return () => { cleanups.forEach((fn) => fn()); };
  }, []);

  return (
    <div ref={rootRef}>
      <style>{LANDING_PAGE_CSS}</style>
      <div dangerouslySetInnerHTML={{ __html: LANDING_PAGE_BODY }} />
    </div>
  );
}

        </p>
      </div>
    </div>

// ---------- Neo (AI assistant) ----------

function NeoOrb({ thinking, speaking, listening, speakBumpRef, onClick }) {
  const canvasRef = useRef(null);
  const rotRef = useRef(0);
  const pulseRef = useRef(0.2);
  const scaleRef = useRef(1);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    const dpr = window.devicePixelRatio || 1;
    const size = 340;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = "100%";
    canvas.style.maxWidth = size + "px";
    canvas.style.height = "auto";
    canvas.style.aspectRatio = "1 / 1";
    ctx.scale(dpr, dpr);

    const N = 420;
    const points = [];
    const golden = Math.PI * (1 + Math.sqrt(5));
    for (let i = 0; i < N; i++) {
      const y = 1 - (i / (N - 1)) * 2;
      const radius = Math.sqrt(1 - y * y);
      const theta = golden * i;
      points.push({ x: Math.cos(theta) * radius, y, z: Math.sin(theta) * radius });
    }

    // Precompute a mesh: each point connects to its handful of nearest
    // neighbors, forming the dense "plexus ball" look when active. This is
    // O(n^2) but only runs once at setup, not per frame.
    const K = 6;
    const edges = [];
    const seen = new Set();
    for (let i = 0; i < N; i++) {
      const dists = [];
      for (let j = 0; j < N; j++) {
        if (i === j) continue;
        const dx = points[i].x - points[j].x, dy = points[i].y - points[j].y, dz = points[i].z - points[j].z;
        dists.push([dx * dx + dy * dy + dz * dz, j]);
      }
      dists.sort((a, b) => a[0] - b[0]);
      for (let k = 0; k < K; k++) {
        const j = dists[k][1];
        const key = i < j ? `${i}-${j}` : `${j}-${i}`;
        if (seen.has(key)) continue;
        seen.add(key);
        edges.push([i, j]);
      }
    }

    const cx = size / 2, cy = size / 2, baseR = 118;

    const drawRing = (rx, ry, dash, alpha, rotDeg) => {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotDeg);
      ctx.strokeStyle = `rgba(18,179,76,${alpha})`;
      ctx.lineWidth = 1;
      ctx.setLineDash(dash || []);
      ctx.beginPath();
      ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    };

    let raf;
    const render = () => {
      const active = thinking || speaking || listening;
      const speed = thinking ? 0.013 : speaking ? 0.011 : listening ? 0.008 : 0.006;
      rotRef.current += speed;

      const sinceBump = Date.now() - (speakBumpRef?.current || 0);
      const bump = speaking && sinceBump < 220 ? (1 - sinceBump / 220) * 0.55 : 0;
      const basePulse = thinking ? 260 : speaking ? 180 : 900;
      const baseAmp = thinking ? 0.3 : speaking ? 0.22 : 0.15;
      pulseRef.current = 0.2 + Math.sin(Date.now() / basePulse) * baseAmp + bump;

      // Smoothly grow the orb when active, ease back down when idle.
      const targetScale = active ? 1.22 : 1;
      scaleRef.current += (targetScale - scaleRef.current) * (active ? 0.22 : 0.1);

      const r = rotRef.current;
      const pulse = pulseRef.current;
      const scale = scaleRef.current;
      const R = baseR * scale;
      ctx.clearRect(0, 0, size, size);

      drawRing(R + 34, R + 34, [2, 6], 0.25, r * 0.3);
      drawRing(R + 22, R + 10, [], 0.18, -r * 0.5);
      drawRing(R + 22, R + 10, [4, 4], 0.15, Math.PI / 2 - r * 0.5);

      const glowScale = speaking ? 1.12 : 1;
      const grad = ctx.createRadialGradient(cx, cy, 4, cx, cy, R * 0.95 * glowScale);
      grad.addColorStop(0, `rgba(18,179,76,${0.16 + pulse * 0.12})`);
      grad.addColorStop(1, "rgba(18,179,76,0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, R * 0.95 * glowScale, 0, Math.PI * 2);
      ctx.fill();

      const cosR = Math.cos(r), sinR = Math.sin(r);
      const proj = points.map((p) => {
        const x = p.x * cosR - p.z * sinR;
        const z = p.x * sinR + p.z * cosR;
        return { x, y: p.y, z };
      });

      // Mesh lines between nearby points — only when active, fading in/out
      // with the same scale/opacity transition as the grow animation.
      const meshAlpha = Math.max(0, (scale - 1) / 0.22);
      if (meshAlpha > 0.02) {
        ctx.lineWidth = 0.7;
        edges.forEach(([i, j]) => {
          const a = proj[i], b = proj[j];
          const depth = ((a.z + b.z) / 2 + 1) / 2;
          ctx.strokeStyle = `rgba(140,255,175,${(0.14 + depth * 0.42) * meshAlpha})`;
          ctx.beginPath();
          ctx.moveTo(cx + a.x * R, cy + a.y * R * 0.98);
          ctx.lineTo(cx + b.x * R, cy + b.y * R * 0.98);
          ctx.stroke();
        });
      }

      proj.sort((a, b) => a.z - b.z).forEach((p) => {
        const depth = (p.z + 1) / 2;
        const size2 = 0.6 + depth * 1.8 + pulse * 0.6;
        const alpha = 0.25 + depth * 0.65;
        const px = cx + p.x * R;
        const py = cy + p.y * R * 0.98;
        ctx.beginPath();
        ctx.fillStyle = `rgba(120,255,160,${alpha})`;
        ctx.shadowColor = "rgba(18,179,76,0.9)";
        ctx.shadowBlur = 4 + depth * 4;
        ctx.arc(px, py, size2, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.shadowBlur = 0;

      raf = requestAnimationFrame(render);
    };
    render();
    return () => cancelAnimationFrame(raf);
  }, [thinking, speaking, listening]);

  return <canvas ref={canvasRef} onClick={onClick} className="block mx-auto cursor-pointer" />;
}


function NeoRadar({ active }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    const dpr = window.devicePixelRatio || 1;
    const size = 160;
    canvas.width = size * dpr; canvas.height = size * dpr;
    canvas.style.width = size + "px"; canvas.style.height = size + "px";
    ctx.scale(dpr, dpr);
    const cx = size / 2, cy = size / 2, rad = size / 2 - 6;
    let sweep = 0, raf;
    const render = () => {
      ctx.clearRect(0, 0, size, size);
      ctx.strokeStyle = "rgba(18,179,76,0.3)";
      ctx.lineWidth = 1;
      [1, 0.66, 0.33].forEach((f) => { ctx.beginPath(); ctx.arc(cx, cy, rad * f, 0, Math.PI * 2); ctx.stroke(); });
      ctx.beginPath(); ctx.moveTo(cx - rad, cy); ctx.lineTo(cx + rad, cy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx, cy - rad); ctx.lineTo(cx, cy + rad); ctx.stroke();

      const grad = ctx.createConicGradient(sweep - 0.9, cx, cy);
      grad.addColorStop(0, "rgba(18,179,76,0)");
      grad.addColorStop(1, `rgba(18,179,76,${active ? 0.5 : 0.3})`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, rad, sweep - 0.9, sweep);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = "rgba(120,255,160,0.9)";
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(sweep) * rad, cy + Math.sin(sweep) * rad);
      ctx.stroke();

      sweep += active ? 0.045 : 0.02;
      raf = requestAnimationFrame(render);
    };
    render();
    return () => cancelAnimationFrame(raf);
  }, [active]);
  return <canvas ref={canvasRef} />;
}

function NeoWaveform({ amplitude }) {
  const canvasRef = useRef(null);
  const ampRef = useRef(amplitude);
  ampRef.current = amplitude;
  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    const dpr = window.devicePixelRatio || 1;
    const w = 220, h = 60;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + "px"; canvas.style.height = h + "px";
    ctx.scale(dpr, dpr);
    let t = 0, raf;
    const render = () => {
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = "rgba(120,255,160,0.85)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      const amp = ampRef.current;
      for (let x = 0; x < w; x++) {
        const y = h / 2 + Math.sin(x * 0.09 + t) * amp * Math.sin(t * 0.6) + Math.sin(x * 0.2 + t * 2) * (amp * 0.35);
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
      t += 0.06;
      raf = requestAnimationFrame(render);
    };
    render();
    return () => cancelAnimationFrame(raf);
  }, []);
  return <canvas ref={canvasRef} />;
}

function NeoClock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const pad = (n) => n.toString().padStart(2, "0");
  return (
    <div className="fs-11 font-mono text-right leading-tight" style={{ color: "#6f9a7a" }}>
      <div style={{ color: "#39e673" }}>{pad(now.getHours())}:{pad(now.getMinutes())}:{pad(now.getSeconds())}</div>
      <div>{now.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }).toUpperCase()}</div>
    </div>
  );
}

function NeoPage({ agency, session, onNavigate, onSignOut, cards, tasks, models, stats, reels, trends, bufferDailyStats }) {
  const [messages, setMessages] = useState([]);
  const [thinking, setThinking] = useState(false);
  const [queriesToday, setQueriesToday] = useState(0);
  const [listening, setListening] = useState(false);
  const [heard, setHeard] = useState("");
  const [speaking, setSpeaking] = useState(false);
  const speakingRef = useRef(false);
  const speakBumpRef = useRef(0);
  const scrollRef = useRef(null);
  const recognitionRef = useRef(null);
  const listeningDebounceRef = useRef(null);
  const activeListenRef = useRef(false);
  const thinkingRef = useRef(false);
  const speechSupported = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, thinking]);

  const requestIdRef = useRef(0);
  const voicesRef = useRef([]);

  // Chrome loads TTS voices asynchronously — grab them as soon as they're
  // ready, and again if the browser tells us the list changed.
  useEffect(() => {
    if (!window.speechSynthesis) return;
    const loadVoices = () => { voicesRef.current = window.speechSynthesis.getVoices(); };
    loadVoices();
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }, []);

  const speakText = (text) => {
    if (!window.speechSynthesis) return;
    try {
      // Chrome's speech queue can get silently stuck (e.g. after a tab switch,
      // or if speak() was called again before the last one finished) — clearing
      // it first is the standard fix for "speak() does nothing, no error."
      window.speechSynthesis.cancel();
      const utter = new window.SpeechSynthesisUtterance(text);
      utter.rate = 0.97;
      utter.pitch = 0.88;
      utter.lang = "en-US";
      const voices = voicesRef.current.length ? voicesRef.current : window.speechSynthesis.getVoices();
      const enVoices = voices.filter((v) => v.lang?.toLowerCase().startsWith("en"));
      const qualityPattern = /natural|enhanced|premium|neural|online/i;
      const malePattern = /male|david|daniel|alex|fred|guy|aaron|arthur|ryan|mark|tom\b/i;
      const femalePattern = /female|samantha|victoria|karen|zira|susan|allison|ava|moira|tessa/i;
      const preferred =
        enVoices.find((v) => v.name === "Google UK English Male") ||
        enVoices.find((v) => qualityPattern.test(v.name) && malePattern.test(v.name) && !femalePattern.test(v.name)) ||
        enVoices.find((v) => malePattern.test(v.name) && !femalePattern.test(v.name)) ||
        enVoices.find((v) => qualityPattern.test(v.name) && !femalePattern.test(v.name)) ||
        enVoices.find((v) => !femalePattern.test(v.name)) ||
        enVoices[0] ||
        voices[0];
      if (preferred) utter.voice = preferred;
      utter.onstart = () => { setSpeaking(true); speakingRef.current = true; };
      utter.onend = () => { setSpeaking(false); speakingRef.current = false; };
      utter.onerror = (e) => {
        setSpeaking(false);
        speakingRef.current = false;
        setHeard(`(voice error: ${e?.error || "unknown"})`);
      };
      utter.onboundary = () => { speakBumpRef.current = Date.now(); };
      // Safari can silently drop speak() if it's called in the very same tick
      // as cancel() — a tiny delay avoids that race, invisibly.
      setTimeout(() => {
        try {
          window.speechSynthesis.speak(utter);
          setTimeout(() => { if (window.speechSynthesis.paused) window.speechSynthesis.resume(); }, 50);
        } catch (err) {
          setHeard(`(voice error: ${err?.message || "failed to speak"})`);
        }
      }, 30);
    } catch (err) {
      setHeard(`(voice error: ${err?.message || "failed to speak"})`);
    }
  };

  const send = async (text) => {
    if (!text || thinkingRef.current) return;
    thinkingRef.current = true;
    setThinking(true);
    const myRequestId = ++requestIdRef.current;
    setMessages((m) => [...m, { role: "user", text }]);
    try {
      const { data, error } = await supabaseClient.functions.invoke("clever-service", {
        body: {
          message: text,
          agency,
          context: {
            viewerRole: session.role,
            viewerName: session.name,
            cardCount: cards.length,
            openTasks: tasks.filter((t) => t.status !== "done").length,
            overdueTasks: tasks.filter((t) => t.status !== "done" && t.dueDate && t.dueDate < todayISO()).length,
            modelNames: models.map((m) => m.name),
            // Per-model earnings/subs history, most recent week first, so Neo can
            // answer "how much did X earn" or "who's growing fastest" directly.
            earningsByModel: models.map((m) => ({
              model: m.name,
              weeks: stats.filter((s) => s.model === m.name)
                .sort((a, b) => (b.weekOf || "").localeCompare(a.weekOf || ""))
                .slice(0, 6)
                .map((s) => ({ weekOf: s.weekOf, ofEarnings: s.ofEarnings, ofSubs: s.ofSubs, igFollowers: s.igFollowers, igReach: s.igReach })),
            })),
            // Best/worst performing reels so Neo can say what's working.
            topReels: [...(reels || [])].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 12)
              .map((r) => ({ model: r.model, title: r.title, weekOf: r.weekOf, views: r.views, likes: r.likes, shares: r.shares, comments: r.comments })),
            recentTrends: trends.filter((t) => (agency === "US" ? t.showUS : t.showCZ)).slice(-6).map((t) => ({ title: t.title, category: t.category })),
            // Buffer-synced social reach per model, last 7 days, so Neo can
            // answer "how's Anna's X doing" or "who's growing on Instagram."
            socialImpressions7d: models.map((m) => ({
              model: m.name,
              instagram: impressionsFor(m.name, "ig"),
              x: impressionsFor(m.name, "x"),
              tiktok: impressionsFor(m.name, "tiktok"),
            })),
          },
        },
      });
      if (error) throw error;
      if (myRequestId !== requestIdRef.current) return; // cancelled — ignore this response
      const reply = data?.reply || "...";
      setMessages((m) => [...m, { role: "neo", text: reply }]);
      setQueriesToday((n) => n + 1);
      speakText(reply);
    } catch (e) {
      if (myRequestId !== requestIdRef.current) return;
      const detail = e?.message || e?.context?.error || (typeof e === "string" ? e : JSON.stringify(e));
      setMessages((m) => [...m, { role: "neo", text: `Couldn't reach Neo — ${detail || "unknown error"}. Check the clever-service function and GROQ_API_KEY secret in Supabase.` }]);
    } finally {
      if (myRequestId === requestIdRef.current) {
        thinkingRef.current = false;
        setThinking(false);
      }
    }
  };

  // Clicking the orb: if Neo is currently thinking, cancel it (matches "click
  // the orb to stop"). If idle, start a one-shot listen — no wake word needed,
  // just talk right after clicking.
  // Click-to-talk. Click once: it listens for what you say and answers.
  // Click again while it's listening, thinking, or speaking: it stops
  // whatever it's doing right then. No wake word, no always-on background
  // listener — the mic is only ever active between a click and the answer.
  const setActiveListeningDebounced = (val) => {
    if (listeningDebounceRef.current) clearTimeout(listeningDebounceRef.current);
    listeningDebounceRef.current = setTimeout(() => setListening(val), val ? 0 : 150);
  };

  const activeOneShotRef = useRef(null);

  const micPrimedRef = useRef(false);

  const startActiveListen = () => {
    if (!speechSupported) return;

    const begin = () => {
      activeListenRef.current = true;
      setActiveListeningDebounced(true);
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const oneShot = new SR();
    activeOneShotRef.current = oneShot;
    oneShot.lang = "en-US";
    // continuous + manual stop-on-final, instead of relying on the browser's
    // own silence detection to end the session — Safari's built-in silence
    // detection is much shorter/less predictable than Chrome's and can cut
    // the session before you've finished a sentence.
    oneShot.continuous = true;
    oneShot.interimResults = true;
    oneShot.maxAlternatives = 1;
    let finalized = false;
    const safety = setTimeout(() => { try { oneShot.stop(); } catch {} }, 12000);
    oneShot.onresult = (e) => {
      const res = e.results[e.results.length - 1];
      const text = res[0].transcript.trim();
      setHeard(text);
      if (res.isFinal && text && !finalized) {
        finalized = true;
        clearTimeout(safety);
        send(text);
        try { oneShot.stop(); } catch {}
      }
    };
    const stopActive = (reason) => {
      clearTimeout(safety);
      activeListenRef.current = false;
      activeOneShotRef.current = null;
      setActiveListeningDebounced(false);
      if (reason) setHeard(`(mic stopped: ${reason})`);
    };
    oneShot.onend = () => stopActive();
    oneShot.onerror = (e) => stopActive(e?.error || "unknown error");
    try { oneShot.start(); } catch (err) { stopActive(err?.message || "failed to start"); }
    };

    // First time ever: explicitly ask for the mic via getUserMedia so Safari
    // shows its native permission prompt reliably, then release the stream
    // immediately (SpeechRecognition manages its own audio capture).
    if (!micPrimedRef.current && navigator.mediaDevices?.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then((stream) => {
          micPrimedRef.current = true;
          stream.getTracks().forEach((t) => t.stop());
          begin();
        })
        .catch(() => begin());
    } else {
      begin();
    }
  };

  const orbClick = () => {
    if (thinking) {
      requestIdRef.current++; // invalidates the in-flight response
      thinkingRef.current = false;
      setThinking(false);
      setMessages((m) => [...m, { role: "neo", text: "(stopped)" }]);
      return;
    }
    if (speakingRef.current) {
      window.speechSynthesis.cancel();
      speakingRef.current = false;
      setSpeaking(false);
      return;
    }
    if (activeListenRef.current) {
      // Already listening — clicking again means "never mind, cancel that."
      try { activeOneShotRef.current?.stop(); } catch {}
      activeListenRef.current = false;
      activeOneShotRef.current = null;
      setActiveListeningDebounced(false);
      return;
    }
    startActiveListen();
  };

  const neoGreen = "#39e673";
  const textDim = "#6f9a7a";
  const border = "rgba(18,179,76,0.25)";
  const bgPanel = "#0e1310";
  const amber = "#39e673";

  // ---- real telemetry ----
  const openTasksCount = tasks.filter((t) => t.status !== "done").length;
  const relevantTrends = trends.filter((t) => (agency === "US" ? t.showUS : t.showCZ));

  // ---- financial strip: this calendar month's revenue vs a goal ----
  const now = new Date();
  const monthStart = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-01`;
  const statsThisMonth = stats.filter((s) => (s.weekOf || "") >= monthStart);
  const monthRevenue = statsThisMonth.reduce((sum, s) => sum + (s.ofEarnings || 0), 0);
  const latestGoalPerModel = models.map((m) => {
    const mine = stats.filter((s) => s.model === m.name).sort((a, b) => (b.weekOf || "").localeCompare(a.weekOf || ""));
    return mine[0]?.earningsGoal || 0;
  });
  const monthGoal = Math.max(1, latestGoalPerModel.reduce((a, b) => a + b, 0) * 4.3);
  const monthPct = Math.min(100, Math.round((monthRevenue / monthGoal) * 100));
  const dayOfMonth = now.getDate();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

  // ---- agency stats grid ----
  const latestPerModel = models.map((m) => stats.filter((s) => s.model === m.name).sort((a, b) => (b.weekOf || "").localeCompare(a.weekOf || ""))[0]).filter(Boolean);
  const prevPerModel = models.map((m) => stats.filter((s) => s.model === m.name).sort((a, b) => (b.weekOf || "").localeCompare(a.weekOf || ""))[1]).filter(Boolean);
  const activeSubs = latestPerModel.reduce((a, s) => a + (s.ofSubs || 0), 0);
  const prevSubs = prevPerModel.reduce((a, s) => a + (s.ofSubs || 0), 0);
  const newSubs7d = activeSubs - prevSubs;
  const topReel = [...(reels || [])].sort((a, b) => (b.views || 0) - (a.views || 0))[0];
  const revLastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString().slice(0, 10);
  const revThisMonthPrior = stats.filter((s) => (s.weekOf || "") >= revLastMonthStart && (s.weekOf || "") < monthStart).reduce((a, s) => a + (s.ofEarnings || 0), 0);
  const revMomPct = revThisMonthPrior > 0 ? Math.round(((monthRevenue - revThisMonthPrior) / revThisMonthPrior) * 100) : null;

  // ---- model table: revenue / subs / IG impressions / X impressions ----
  const bufWeekAgo = new Date(); bufWeekAgo.setDate(bufWeekAgo.getDate() - 7);
  const bufWeekAgoStr = bufWeekAgo.toISOString().slice(0, 10);
  const impressionsFor = (modelName, platform) => (bufferDailyStats || [])
    .filter((r) => r.model === modelName && r.platform === platform && r.statDate >= bufWeekAgoStr)
    .reduce((a, r) => a + (r.impressions || 0), 0);
  const fmtK = (n) => (n >= 1000000 ? (n / 1000000).toFixed(1) + "M" : n >= 1000 ? (n / 1000).toFixed(1) + "K" : n ? String(n) : "—");

  // ---- ambient/real log feed ----
  const logLines = [];
  messages.slice(-4).forEach((m) => logLines.unshift(m.role === "user" ? `you :: "${m.text.slice(0, 40)}"` : `neo :: "${m.text.slice(0, 40)}"`));
  if (logLines.length < 4) {
    [...(reels || [])].sort((a, b) => b.createdAt - a.createdAt).slice(0, 2).forEach((r) => logLines.push(`reel.logged :: ${r.model} — ${(r.views || 0).toLocaleString()} views`));
    relevantTrends.slice(-2).forEach((t) => logLines.push(`trend.posted :: ${t.title?.slice(0, 30)}`));
  }

  return (
    <div className="-m-6 p-6" style={{ background: "radial-gradient(ellipse at 50% 0%, #07090a 0%, #050605 70%)", minHeight: "calc(100vh - 160px)", fontFamily: "'JetBrains Mono', monospace" }}>
      {/* mini topbar */}
      <div className="flex items-center justify-between pb-3 mb-5" style={{ borderBottom: `1px solid ${border}` }}>
        <div className="font-bold tracking-widest" style={{ color: neoGreen, textShadow: `0 0 8px ${neoGreen}88`, fontSize: "20px" }}>
          NEO <span style={{ color: textDim, fontWeight: 400 }}>// AGENCY OS INTELLIGENCE SYSTEM</span>
        </div>
        <NeoClock />
      </div>

      {/* HUD panel */}
      <div className="relative rounded p-5" style={{ border: `1px solid ${border}`, background: `linear-gradient(180deg, rgba(18,179,76,0.04), transparent 40%), ${bgPanel}` }}>
        <div className="fs-10 tracking-widest mb-3" style={{ color: textDim, letterSpacing: "3px" }}>
          STATUS <b style={{ color: neoGreen }}>{thinking ? "PROCESSING" : speaking ? "SPEAKING" : "ONLINE"}</b> — {speechSupported ? (speaking ? "OUTPUT" : listening ? "LISTENING FOR INPUT" : "STANDBY — CLICK TO TALK") : "VOICE NEEDS CHROME"}
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-[220px_1fr_220px] gap-4">
          {/* left telemetry */}
          <div className="fs-11" style={{ color: textDim }}>
            <div className="flex justify-between py-1.5" style={{ borderBottom: "1px dashed rgba(18,179,76,0.12)" }}>
              <span>ACTIVE MODELS</span><b style={{ color: neoGreen }}>{models.length}</b>
            </div>
            <div className="flex justify-between py-1.5" style={{ borderBottom: "1px dashed rgba(18,179,76,0.12)" }}>
              <span>OPEN TASKS</span><b style={{ color: neoGreen }}>{openTasksCount}</b>
            </div>
            <div className="flex justify-between py-1.5" style={{ borderBottom: "1px dashed rgba(18,179,76,0.12)" }}>
              <span>OPEN CARDS</span><b style={{ color: neoGreen }}>{cards.length}</b>
            </div>
            <div className="flex justify-between py-1.5" style={{ borderBottom: "1px dashed rgba(18,179,76,0.12)" }}>
              <span>TRENDS SHARED</span><b style={{ color: neoGreen }}>{relevantTrends.length}</b>
            </div>

            <div className="mt-4 fs-10 leading-loose" style={{ color: "#12b34c" }}>
              {logLines.length === 0 && <div style={{ color: textDim, fontStyle: "italic" }}>no recent activity</div>}
              {logLines.map((l, i) => <div key={i}>{l}</div>)}
            </div>
          </div>

          {/* center sphere */}
          <div className="flex flex-col items-center justify-center">
            <NeoOrb thinking={thinking} speaking={speaking} listening={listening} speakBumpRef={speakBumpRef} onClick={orbClick} />
            <div className="fs-10 tracking-widest mt-1" style={{ color: textDim, letterSpacing: "3px" }}>
              N.E.O. — <b style={{ color: amber }}>NEURAL ENGAGEMENT ORCHESTRATOR</b>
            </div>
            <div className="fs-11 italic mt-2 text-center max-w-xs" style={{ color: neoGreen, opacity: 0.85 }}>
              {thinking ? "thinking — click the orb to stop." : speaking ? "speaking — click the orb to stop." : listening ? "listening — click the orb to stop." : "click the orb to ask something."}
            </div>
            {heard && <div className="fs-10 italic mt-1" style={{ color: neoGreen, opacity: 0.4 }}>heard: "{heard}"</div>}
          </div>

          {/* right radar + waveform */}
          <div className="flex flex-col items-center">
            <div className="fs-10 tracking-widest mb-2" style={{ color: textDim, letterSpacing: "2px" }}>PROXIMITY</div>
            <NeoRadar active={listening || thinking} />
            <div className="fs-10 tracking-widest mt-3 mb-1.5" style={{ color: textDim, letterSpacing: "2px" }}>AUDIO I/O</div>
            <NeoWaveform amplitude={speaking ? 9 : listening ? 4 : 1.5} />
          </div>
        </div>

        {/* financial strip */}
        <div className="flex items-center gap-7 flex-wrap mt-6 pt-4" style={{ borderTop: `1px solid ${border}` }}>
          <div>
            <div className="fs-9 tracking-widest" style={{ color: textDim, letterSpacing: "2px" }}>PRIMARY OBJECTIVE — MONTHLY REVENUE</div>
            <div className="text-3xl font-bold" style={{ color: amber, textShadow: "0 0 12px rgba(255,210,74,0.45)" }}><CountUp value={monthRevenue} prefix="$" /></div>
          </div>
          <div className="flex gap-5">
            <div className="fs-13" style={{ color: neoGreen }}>
              ${Math.round(monthGoal).toLocaleString()}
              <span className="block fs-9 mt-0.5" style={{ color: textDim, letterSpacing: "1.5px" }}>GOAL</span>
            </div>
            <div className="fs-13" style={{ color: neoGreen }}>
              ${Math.max(0, Math.round(monthGoal - monthRevenue)).toLocaleString()}
              <span className="block fs-9 mt-0.5" style={{ color: textDim, letterSpacing: "1.5px" }}>REMAINING</span>
            </div>
          </div>
          <div className="flex-1 minw-180">
            <div className="h-1.5 rounded-full overflow-hidden" style={{ background: "#0a5c2c" }}>
              <div className="h-full transition-all" style={{ width: `${monthPct}%`, background: `linear-gradient(90deg, #12b34c, ${neoGreen})`, boxShadow: `0 0 8px ${neoGreen}88` }} />
            </div>
            <div className="flex justify-between fs-9 mt-1" style={{ color: textDim, letterSpacing: "1px" }}>
              <span>DAY {dayOfMonth}/{daysInMonth}</span><span>{monthPct}%</span>
            </div>
          </div>
        </div>
      </div>

      {/* agency stats (team only — this whole page already is) */}
      <div className="flex items-center gap-3 mt-10 mb-4">
        <div className="fs-11 tracking-widest px-2.5 py-1 rounded" style={{ color: textDim, letterSpacing: "3px", border: `1px solid ${border}` }}>
          AGENCY STATS
          <span className="fs-9 ml-2 px-1.5 py-0.5 rounded" style={{ color: amber, border: "1px solid rgba(255,210,74,0.35)", letterSpacing: "2px" }}>TEAM ONLY</span>
        </div>
        <div className="flex-1 h-px" style={{ background: border }} />
      </div>

      <div className="grid gap-3.5" style={{ gridTemplateColumns: "repeat(4, 1fr)" }}>
        <div className="p-4" style={{ border: `1px solid ${border}`, background: bgPanel }}>
          <div className="fs-9 tracking-widest mb-2" style={{ color: textDim, letterSpacing: "2px" }}>REVENUE THIS MONTH</div>
          <div className="text-2xl font-bold" style={{ color: neoGreen, textShadow: `0 0 8px ${neoGreen}88` }}>$<CountUp value={monthRevenue} /></div>
          {revMomPct !== null && <div className="fs-10 mt-1" style={{ color: revMomPct >= 0 ? "#12b34c" : "#ff5b5b" }}>{revMomPct >= 0 ? "▲" : "▼"} {Math.abs(revMomPct)}% vs last month</div>}
        </div>
        <div className="p-4" style={{ border: `1px solid ${border}`, background: bgPanel }}>
          <div className="fs-9 tracking-widest mb-2" style={{ color: textDim, letterSpacing: "2px" }}>ACTIVE SUBS</div>

        {models.map((m) => {

            <div key={m.name} className="grid fs-12 px-4 py-2.5" style={{ gridTemplateColumns: "1.2fr 1fr 1fr 1fr 1fr", color: neoGreen, borderBottom: "1px dashed rgba(18,179,76,0.1)" }}>

              <span>{latest ? `$${latest.ofEarnings.toLocaleString()}` : <span style={{ color: textDim }}>—</span>}</span>
              <span>{latest ? latest.ofSubs.toLocaleString() : <span style={{ color: textDim }}>—</span>}</span>
              <span>{fmtK(impressionsFor(m.name, "ig")) === "—" ? <span style={{ color: textDim }}>—</span> : fmtK(impressionsFor(m.name, "ig"))}</span>
              <span>{fmtK(impressionsFor(m.name, "x")) === "—" ? <span style={{ color: textDim }}>—</span> : fmtK(impressionsFor(m.name, "x"))}</span>
            </div>

        })}
      </div>
    </div>
  );
}

// ---------- notifications ----------

function NotificationBell({ model, cards, tasks, trends, agency, models, persistModels, onNavigate }) {
  const [open, setOpen] = useState(false);
  const [frozen, setFrozen] = useState(null);
  const lastSeen = model?.notifLastSeen || 0;
  const myName = model?.name;

  const newIdeas = cards.filter((c) => c.model === myName && c.source === "team" && c.createdAt > lastSeen);
  const newCalendar = tasks.filter((t) => t.model === myName && t.createdAt > lastSeen);
  const newTrends = trends.filter((t) => (agency === "US" ? t.showUS : t.showCZ) && t.createdAt > lastSeen);
  const live = { newIdeas, newCalendar, newTrends };
  const total = newIdeas.length + newCalendar.length + newTrends.length;

  const toggle = async () => {
    if (!open) {
      setFrozen(live); // snapshot what's new before marking as seen, so items don't disappear mid-view
      setOpen(true);
      if (total > 0) {
        await persistModels(models.map((m) => (m.name === myName ? { ...m, notifLastSeen: Date.now() } : m)));
      }
    } else {
      setOpen(false);
    }
  };

  const shown = frozen || live;

  return (
    <div className="relative">
      <button onClick={toggle} className="relative p-1.5 rounded-lg c-muted hover-text-primary hover-bg-surface transition-colors">
        <Bell size={16} />
        {total > 0 && (
          <span className="absolute -top-0.5 -right-0.5 min-w-[15px] h-[15px] px-1 rounded-full c-bg-accent c-onaccent fs-9 font-mono font-bold flex items-center justify-center">
            {total > 9 ? "9+" : total}
          </span>
        )}
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-2 w-72 c-bg-surface border c-border rounded-xl shadow-2xl z-50 p-2 max-h-80 overflow-y-auto">
          {shown.newIdeas.length + shown.newCalendar.length + shown.newTrends.length === 0 && (
            <div className="fs-12 c-faint font-mono italic text-center py-6">You're all caught up.</div>
          )}
          {shown.newIdeas.map((c) => (
            <button key={c.id} onClick={() => { onNavigate("content"); setOpen(false); }}
              className="w-full text-left px-2.5 py-2 rounded-lg hover-bg-app transition-colors">
              <div className="fs-10 font-mono uppercase c-accent">New idea</div>
              <div className="fs-12 c-text">{c.title || "Untitled scene"}</div>
            </button>
          ))}
          {shown.newCalendar.map((t) => (
            <button key={t.id} onClick={() => { onNavigate("calendar"); setOpen(false); }}
              className="w-full text-left px-2.5 py-2 rounded-lg hover-bg-app transition-colors">
              <div className="fs-10 font-mono uppercase c-success">Calendar</div>
              <div className="fs-12 c-text">{t.title}{t.dueDate ? ` — due ${fmtDay(t.dueDate)}` : ""}</div>
            </button>
          ))}
          {shown.newTrends.map((t) => (
            <button key={t.id} onClick={() => { onNavigate("trending"); setOpen(false); }}
              className="w-full text-left px-2.5 py-2 rounded-lg hover-bg-app transition-colors">
              <div className="fs-10 font-mono uppercase" style={{ color: "#E2725B" }}>New trend</div>
              <div className="fs-12 c-text">{t.title}</div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- creator dashboard ----------

function DeltaTag({ current, previous }) {
  if (previous === undefined || previous === null) return null;
  const diff = current - previous;
  const pct = previous !== 0 ? (diff / previous) * 100 : 0;
  if (diff === 0) return <span className="flex items-center gap-0.5 fs-10 font-mono c-muted"><Minus size={10} />0%</span>;
  const up = diff > 0;
  return (
    <span className={`flex items-center gap-0.5 fs-10 font-mono ${up ? "c-success" : "c-warn"}`}>
      {up ? <TrendingUp size={10} /> : <TrendingDown size={10} />}
      {up ? "+" : ""}{pct.toFixed(0)}%
    </span>
  );
}

function StatCardBig({ icon: Icon, label, value, delta, color }) {
  return (
    <div className="c-bg-surface border c-border rounded-xl p-4 flex-1 minw-150">
      <div className="flex items-center justify-between mb-2">
        <Icon size={15} style={{ color }} />
        {delta}
      </div>
      <div className="fs-10 uppercase tracking-widest c-muted font-mono mb-1">{label}</div>
      <div className="text-xl md:text-2xl font-semibold c-text">{value}</div>
    </div>
  );
}

function GoalCard({ latest }) {
  const goal = latest.earningsGoal || 0;
  const actual = latest.ofEarnings || 0;
  if (!goal) return null;
  const pct = Math.min(150, Math.round((actual / goal) * 100));
  const hit = actual >= goal;
  return (
    <div className="c-bg-surface border rounded-xl p-5 mb-6" style={{ borderColor: hit ? "#39e673" : undefined }}>
      <div className="flex items-center justify-between mb-2">
        <span className="fs-11 uppercase tracking-widest c-muted font-mono">This week's earnings goal</span>
        {hit && <span className="fs-11 font-mono c-success uppercase tracking-wide">🔥 Goal hit!</span>}
      </div>

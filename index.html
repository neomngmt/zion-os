}

if (!window.storage) {
  window.storage = {
    async get(key) {
      const cfg = TABLES[key];
      if (!cfg) return null;
      try {
        if (cfg.mode === "singleton") {
          const { data, error } = await supabaseClient.from(cfg.table).select("*").eq("id", 1).maybeSingle();
          if (error || !data) return null;
          return { key, value: JSON.stringify(cfg.fromDb(data)) };
        }
        const { data, error } = await supabaseClient.from(cfg.table).select("*");
        if (error) { console.error("storage.get", key, error); return null; }
        return { key, value: JSON.stringify((data || []).map(cfg.fromDb)) };
      } catch (e) { console.error("storage.get threw", key, e); return null; }
    },
    async set(key, value) {
      const cfg = TABLES[key];
      if (!cfg) return null;
      try {
        const parsed = JSON.parse(value);
        if (cfg.mode === "singleton") {
          const { error } = await supabaseClient.from(cfg.table).upsert(cfg.toDb(parsed));
          if (error) { console.error("storage.set", key, error); return null; }
          return { key, value };
        }
        const rows = parsed.map(cfg.toDb);
        if (rows.length) {
          const { error } = await supabaseClient.from(cfg.table).upsert(rows);
          if (error) { console.error("storage.set upsert", key, error); return null; }
        }
        // Remove rows that are no longer present in the current array (handles deletes).
        const { data: existing } = await supabaseClient.from(cfg.table).select(cfg.idKey);
        const currentIds = new Set(rows.map((r) => r[cfg.idKey]));
        const toDelete = (existing || []).map((r) => r[cfg.idKey]).filter((id) => !currentIds.has(id));
        if (toDelete.length) {
          await supabaseClient.from(cfg.table).delete().in(cfg.idKey, toDelete);
        }
        return { key, value };
      } catch (e) { console.error("storage.set threw", key, e); return null; }
    },
    async delete(key) {
      const cfg = TABLES[key];
      if (!cfg) return null;
      try {
        if (cfg.mode === "singleton") await supabaseClient.from(cfg.table).delete().eq("id", 1);
        else await supabaseClient.from(cfg.table).delete().neq(cfg.idKey, "__none__");
        return { key, deleted: true };
      } catch { return null; }
    },
    async list() { return { keys: Object.keys(TABLES) }; },
  };
}

// ---------- storage hooks ----------

function usePersisted(key, fallback, shared = true) {
  const [value, setValue] = useState(fallback);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const res = await window.storage.get(key, shared);
      setValue(res ? JSON.parse(res.value) : fallback);
    } catch {
      setValue(fallback);
    }
    setLoading(false);
  }, [key, shared]);

  useEffect(() => { load(); }, [load]);

  const persist = async (next) => {
    setValue(next);
    try {
      await window.storage.set(key, JSON.stringify(next), shared);
    } catch (e) {
      console.error("save failed", e);
    }
  };

  return { value, loading, persist };
}

// ---------- shared bits ----------

function CountUp({ value, prefix = "", duration = 600 }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    let raf;
    const start = performance.now();
    const from = 0;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(Math.round(from + (value - from) * eased));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <>{prefix}{display.toLocaleString()}</>;
}

}

function ContentDirector({ cards, persistCards, models, restrictModel }) {
  const [detail, setDetail] = useState(null);
  const [adding, setAdding] = useState(false);
  const [newTitle, setNewTitle] = useState("");
  const [newModel, setNewModel] = useState(restrictModel || "");
  const [newPlatform, setNewPlatform] = useState("ig");
  const [filter, setFilter] = useState(restrictModel || "all");
  const [network, setNetwork] = useState("all");

  const nextSeq = () => (cards.reduce((m, c) => Math.max(m, c.seq || 0), 0) + 1);

  const addCard = async () => {
    if (!newTitle.trim()) return;
    const card = {
      id: uid(), seq: nextSeq(), title: newTitle, model: restrictModel || newModel, sceneType: "",
      platform: newPlatform, location: "", deadline: "", assignee: "", scriptLink: "", notes: "",
      stage: "idea", source: restrictModel ? "creator" : "team", createdAt: Date.now(),
    };
    await persistCards([...cards, card]);
    setNewTitle(""); setNewModel(restrictModel || ""); setNewPlatform("ig"); setAdding(false);
  };

  const advance = async (id, stageId) => {
    await persistCards(cards.map((c) => (c.id === id ? { ...c, stage: stageId } : c)));
  };
  const saveCard = async (updated) => {
    await persistCards(cards.map((c) => (c.id === updated.id ? updated : c)));
    setDetail(null);
  };
  const deleteCard = async (id) => {
    await persistCards(cards.filter((c) => c.id !== id));
    setDetail(null);
  };

  const byModel = filter === "all" ? cards : cards.filter((c) => c.model === filter);
  const visible = network === "all" ? byModel : byModel.filter((c) => (c.platform || "ig") === network);
  const countFor = (netId) => (netId === "all" ? byModel.length : byModel.filter((c) => (c.platform || "ig") === netId).length);

  return (
    <div className="flex gap-5">
      <div className="minw-140 w-140 flex-shrink-0 hidden md:block">
        <div className="fs-10 uppercase tracking-widest c-faint font-mono mb-2 px-1">Network</div>
        <div className="space-y-1">
          <button onClick={() => setNetwork("all")}
            className={`w-full flex items-center justify-between px-3 py-2 rounded-lg fs-12 font-mono transition-colors ${network === "all" ? "c-bg-accent-a2 c-accent font-semibold" : "c-muted hover-bg-surface"}`}>
            <span>All</span><span className="fs-10 c-faint">{countFor("all")}</span>
          </button>
          {PLATFORMS.map((p) => {
            const Icon = p.icon === "Instagram" ? Instagram : p.icon === "Flame" ? Flame : X;
            return (
              <button key={p.id} onClick={() => setNetwork(p.id)}
                className={`w-full flex items-center justify-between px-3 py-2 rounded-lg fs-12 font-mono transition-colors ${network === p.id ? "c-bg-accent-a2 c-accent font-semibold" : "c-muted hover-bg-surface"}`}>
                <span className="flex items-center gap-1.5"><Icon size={12} />{p.label}</span>
                <span className="fs-10 c-faint">{countFor(p.id)}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div className="flex-1 min-w-0">
      {/* Mobile network selector (no left column on small screens) */}
      <div className="flex items-center gap-1.5 mb-3 md:hidden overflow-x-auto">
        <button onClick={() => setNetwork("all")}
          className={`fs-10 font-mono uppercase px-2.5 py-1 rounded-lg border flex-shrink-0 ${network === "all" ? "c-border-accent c-accent" : "c-border c-muted"}`}>
          All
        </button>
        {PLATFORMS.map((p) => (
          <button key={p.id} onClick={() => setNetwork(p.id)}
            className={`fs-10 font-mono uppercase px-2.5 py-1 rounded-lg border flex-shrink-0 ${network === p.id ? "c-border-accent c-accent" : "c-border c-muted"}`}>
            {p.label}
          </button>
        ))}
      </div>

      <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
        {!restrictModel && (
          <div className="flex items-center gap-1.5 flex-wrap">
            <button onClick={() => setFilter("all")}
              className={`fs-11 font-mono uppercase px-2.5 py-1 rounded-lg border ${filter === "all" ? "c-border-accent c-accent" : "c-border c-muted"}`}>
              All
            </button>
            {models.map((m) => (
              <button key={m.name} onClick={() => setFilter(m.name)}
                className={`fs-11 font-mono uppercase px-2.5 py-1 rounded-lg border ${filter === m.name ? "c-border-accent c-accent" : "c-border c-muted"}`}>
                {m.name}
              </button>
            ))}
          </div>
        )}
        {restrictModel && <span className="fs-11 font-mono uppercase c-accent">{restrictModel}'s scenes</span>}
        <button onClick={() => setAdding(true)}
          className="flex items-center gap-1.5 fs-11 font-mono uppercase tracking-wide c-bg-accent c-onaccent px-3 py-1.5 rounded-lg font-semibold hover-bg-accent2">
          <Plus size={13} /> New scene
        </button>
      </div>

      {adding && (
        <div className="mb-4 c-bg-surface border c-border rounded-xl p-3 flex gap-2 flex-wrap">
          <input autoFocus value={newTitle} onChange={(e) => setNewTitle(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && addCard()} placeholder="Scene title / hook..."
            className="flex-1 minw-160 c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none focus-border-accent" />
          <select value={newPlatform} onChange={(e) => setNewPlatform(e.target.value)}
            className="c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none">
            {PLATFORMS.map((p) => <option key={p.id} value={p.id}>{p.label}</option>)}
          </select>
          {!restrictModel && (
            <select value={newModel} onChange={(e) => setNewModel(e.target.value)}
              className="c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none">
              <option value="">Model</option>
              {models.map((m) => <option key={m.name} value={m.name}>{m.name}</option>)}
            </select>
          )}
          <button onClick={addCard} className="px-3 py-2 rounded-lg c-bg-accent c-onaccent text-xs font-mono uppercase font-semibold">Add</button>
          <button onClick={() => setAdding(false)} className="px-3 py-2 rounded-lg border c-border c-muted text-xs font-mono uppercase">Cancel</button>
        </div>
      )}

      <div className="flex gap-3 overflow-x-auto pb-4 snap-x snap-proximity -mx-4 px-4 md:mx-0 md:px-0">
        {STAGES.map((stage) => {
          const stageCards = visible.filter((c) => c.stage === stage.id);
          return (
            <div key={stage.id} className="minw-240 w-240 flex-shrink-0 snap-start">
              <div className="flex items-center gap-2 mb-3 pb-2 border-b" style={{ borderColor: stage.color + "55" }}>
                <span className="font-mono fs-10" style={{ color: stage.color }}>{stage.code}</span>
                <span className="fs-11 uppercase tracking-widest font-semibold" style={{ color: stage.color }}>{stage.label}</span>
                <span className="ml-auto fs-10 font-mono c-muted">{stageCards.length}</span>
              </div>
              {stageCards.length === 0 && (
                <div className="fs-11 c-faint font-mono italic py-6 text-center border border-dashed c-border rounded-xl">empty</div>
              )}
              {stageCards.map((card) => (
                <CardTile key={card.id} card={card} onAdvance={advance} onDelete={deleteCard} onOpen={setDetail} />
              ))}
            </div>
          );
        })}
      </div>

      {detail && <CardDetail card={detail} models={models} restrictModel={restrictModel} onClose={() => setDetail(null)} onSave={saveCard} onDelete={deleteCard} />}
      </div>
    </div>
  );
}

function ModelManager({ models, persistModels, cards, agency }) {
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState("");
  const [note, setNote] = useState("");
  const [pin, setPin] = useState("");
  const [detailName, setDetailName] = useState(null);

  const addModel = async () => {
    if (!name.trim()) return;
    await persistModels([...models, {
      name: name.trim(), note, pin: pin.trim(), onboarded: false, addedAt: Date.now(), agency: agency || "CZ",
      igHandle: "", xHandle: "", tiktokHandle: "", ofUrl: "", driveUrl: "", bio: "",
    }]);
    setName(""); setNote(""); setPin(""); setAdding(false);
  };
  const removeModel = async (n) => {
    await persistModels(models.filter((m) => m.name !== n));
  };
  const setModelPin = async (n, newPin) => {
    await persistModels(models.map((m) => (m.name === n ? { ...m, pin: newPin } : m)));
  };
  const toggleAlwaysOnboard = async (n) => {
    await persistModels(models.map((m) => (m.name === n ? { ...m, alwaysOnboard: !m.alwaysOnboard } : m)));
  };
  const saveDetail = async (updated) => {
    await persistModels(models.map((m) => (m.name === updated.name ? updated : m)));
    setDetailName(null);
  };

  const detailModel = models.find((m) => m.name === detailName);

  return (
    <div>

function CreatorForm({ models, cards, persistCards, restrictModel }) {
  const [model, setModel] = useState(restrictModel || "");
  const [title, setTitle] = useState("");
  const [sceneType, setSceneType] = useState("");
  const [location, setLocation] = useState("");
  const [notes, setNotes] = useState("");
  const [sent, setSent] = useState(false);

  const nextSeq = () => (cards.reduce((m, c) => Math.max(m, c.seq || 0), 0) + 1);

  const submit = async () => {
    const chosenModel = restrictModel || model;
    if (!chosenModel || !title.trim()) return;
    const card = {
      id: uid(), seq: nextSeq(), title, model: chosenModel, sceneType, location,
      deadline: "", assignee: "", scriptLink: "", notes,
      stage: "idea", source: "creator", createdAt: Date.now(),
    };
    await persistCards([...cards, card]);
    setSent(true);
    setTitle(""); setSceneType(""); setLocation(""); setNotes("");
    setTimeout(() => setSent(false), 2500);

  return (
    <div className="max-w-md">
      <p className="c-muted text-sm mb-5">Tell us what you want to shoot next. It lands straight on the board as a new idea.</p>

      {!restrictModel && (

            {models.map((m) => <option key={m.name} value={m.name}>{m.name}</option>)}
          </select>
        </>
      )}

      <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">What do you want to shoot?</label>
      <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="e.g. cooking breakfast, morning routine bit..."

      <div className="grid grid-cols-2 gap-3 mb-3">
        <div>
          <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">Vibe / type</label>
          <input value={sceneType} onChange={(e) => setSceneType(e.target.value)} placeholder="girl next door..."
            className="w-full c-bg-surface border c-border rounded-lg px-2.5 py-2.5 text-sm c-text outline-none focus-border-accent" />

// ---------- dashboard ----------

function Dashboard({ cards, models, stats, reels, onNavigate }) {
  const activeCount = cards.filter((c) => c.stage !== "posted").length;
  const filmingToday = cards.filter((c) => c.stage === "filming").length;
  const pendingIdeas = cards.filter((c) => c.stage === "idea" && c.source === "creator").length;
  const recent = [...cards].sort((a, b) => b.createdAt - a.createdAt).slice(0, 6);

  // Latest weekly entry per model, summed for total agency revenue
  const latestPerModel = models.map((m) => {
    const own = stats.filter((s) => s.model === m.name).sort((a, b) => b.weekOf.localeCompare(a.weekOf));
    return own[0];
  }).filter(Boolean);
  const totalRevenue = latestPerModel.reduce((sum, s) => sum + (s.ofEarnings || 0), 0);
  const mostRecentWeek = latestPerModel.length ? latestPerModel.map((s) => s.weekOf).sort().slice(-1)[0] : null;
  const prevWeekTotal = mostRecentWeek
    ? models.reduce((sum, m) => {
        const own = stats.filter((s) => s.model === m.name && s.weekOf < mostRecentWeek).sort((a, b) => b.weekOf.localeCompare(a.weekOf));
        return sum + (own[0]?.ofEarnings || 0);
      }, 0)
    : null;

  // Best reel from the most recent week that has any reels logged
  const latestReelWeek = reels.length ? [...reels].map((r) => r.weekOf).sort().slice(-1)[0] : null;
  const reelOfWeek = latestReelWeek
    ? reels.filter((r) => r.weekOf === latestReelWeek).sort((a, b) => b.views - a.views)[0]
    : null;

  return (
    <div>
      <div className="c-bg-surface border c-border rounded-xl p-5 mb-6">
        <div className="flex items-center justify-between mb-1">
          <span className="fs-11 uppercase tracking-widest c-muted font-mono">Agency weekly revenue</span>
          {mostRecentWeek && <DeltaTag current={totalRevenue} previous={prevWeekTotal} />}
        </div>
        {latestPerModel.length === 0 ? (
          <div className="fs-12 c-faint font-mono italic py-4">No stats logged yet, add weekly entries in Stats.</div>
        ) : (
          <>
            <div className="text-4xl md:text-5xl font-extrabold c-accent mb-1">$<CountUp value={totalRevenue} /></div>
            <div className="fs-11 c-faint font-mono">across {latestPerModel.length} model{latestPerModel.length === 1 ? "" : "s"}, week of {fmtDay(mostRecentWeek)}</div>
          </>
        )}
      </div>

      <div className="flex gap-3 flex-wrap mb-6">
        <StatCard label="Active scenes" value={activeCount} color="#E5335C" />
        <StatCard label="In filming" value={filmingToday} color="#E2725B" />
        <StatCard label="Ideas to review" value={pendingIdeas} color="#8B93A1" />
        <StatCard label="Models" value={models.length} color="#F2F2F4" />
      </div>

      <div className="c-bg-surface border c-border rounded-xl p-4 mb-6">
        <div className="flex items-center justify-between mb-3">
          <span className="fs-11 uppercase tracking-widest c-muted font-mono">Reel of the week</span>
          <button onClick={() => onNavigate("stats")} className="fs-11 font-mono uppercase c-accent hover:underline">Log a reel →</button>
        </div>
        {!reelOfWeek ? (
          <div className="fs-12 c-faint font-mono italic py-4">No reels logged yet, add them in Stats.</div>
        ) : (
          <div>
            <div className="flex items-center gap-2 mb-2">
              <span className="c-text text-sm font-medium">{reelOfWeek.title || "Untitled reel"}</span>
              <span className="fs-10 font-mono c-accent uppercase">{reelOfWeek.model}</span>
            </div>
            <div className="flex gap-5 flex-wrap fs-11 font-mono c-muted mb-2">
              <span><span className="c-text">{reelOfWeek.views.toLocaleString()}</span> views</span>
              <span><span className="c-text">{reelOfWeek.likes.toLocaleString()}</span> likes</span>
              <span><span className="c-text">{reelOfWeek.shares.toLocaleString()}</span> shares</span>
              <span><span className="c-text">{reelOfWeek.comments.toLocaleString()}</span> comments</span>
            </div>
            {reelOfWeek.link && (
              <a href={reelOfWeek.link} target="_blank" rel="noopener noreferrer" className="fs-11 font-mono c-accent hover-accent-text">Open reel →</a>
            )}
          </div>
        )}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
        <div className="lg:col-span-3 c-bg-surface border c-border rounded-xl p-4">
          <div className="flex items-center justify-between mb-3">
            <span className="fs-11 uppercase tracking-widest c-muted font-mono">Pipeline snapshot</span>
            <button onClick={() => onNavigate("content")} className="fs-11 font-mono uppercase c-accent hover:underline">Open board →</button>
          </div>
          <div className="space-y-2.5">
            {STAGES.map((s) => {
              const n = cards.filter((c) => c.stage === s.id).length;
              const max = Math.max(1, cards.length);
              return (
                <div key={s.id} className="flex items-center gap-3">
                  <span className="fs-10 font-mono w-16" style={{ color: s.color }}>{s.label}</span>
                  <div className="flex-1 h-2 c-bg-app rounded-full overflow-hidden">
                    <div className="h-full rounded-full" style={{ width: `${(n / max) * 100}%`, backgroundColor: s.color }} />
                  </div>
                  <span className="fs-11 font-mono c-muted w-5 text-right">{n}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div className="lg:col-span-2 c-bg-surface border c-border rounded-xl p-4">
          <div className="flex items-center justify-between mb-3">
            <span className="fs-11 uppercase tracking-widest c-muted font-mono">Recent activity</span>

            <div className="fs-11 c-faint font-mono italic py-6 text-center">nothing yet</div>
          ) : (
            <div className="space-y-2">
              {recent.map((c) => {
                const stage = STAGES.find((s) => s.id === c.stage);
                return (
                  <div key={c.id} className="flex items-center gap-2 text-xs">
                    <Circle size={6} fill={stage.color} color={stage.color} />

                    <span className="c-muted font-mono fs-10">{c.model || "—"}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ---------- date helpers ----------

const toISO = (d) => d.toISOString().slice(0, 10);
const todayISO = () => toISO(new Date());
const addDays = (iso, n) => {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + n);
  return toISO(d);
};
const fmtDay = (iso) => {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
};

// ---------- tasks ----------

function TaskManager({ tasks, persistTasks, models, restrictModel }) {
  const [adding, setAdding] = useState(false);
  const [title, setTitle] = useState("");
  const [model, setModel] = useState(restrictModel || "");
  const [assignee, setAssignee] = useState("");
  const [dueDate, setDueDate] = useState(todayISO());
  const [recurring, setRecurring] = useState(false);
  const [filter, setFilter] = useState(restrictModel || "all");

  const nextSeq = () => (tasks.reduce((m, t) => Math.max(m, t.seq || 0), 0) + 1);

  const addTask = async () => {
    if (!title.trim()) return;
    const task = {
      id: uid(), seq: nextSeq(), title, model: restrictModel || model, assignee, dueDate, recurring,
      status: "todo", notes: "", createdAt: Date.now(),
    };
    await persistTasks([...tasks, task]);
    setTitle(""); setModel(restrictModel || ""); setAssignee(""); setDueDate(todayISO()); setRecurring(false); setAdding(false);
  };

  const toggleDone = async (task) => {
    const done = task.status !== "done";
    let next = tasks.map((t) => (t.id === task.id ? { ...t, status: done ? "done" : "todo" } : t));
    if (done && task.recurring) {
      next = [...next, {
        id: uid(), seq: nextSeq() + 1, title: task.title, model: task.model, assignee: task.assignee,
        dueDate: addDays(task.dueDate || todayISO(), 7), recurring: true,
        status: "todo", notes: task.notes, createdAt: Date.now(),
      }];
    }
    await persistTasks(next);
  };

  const deleteTask = async (id) => {
    await persistTasks(tasks.filter((t) => t.id !== id));
  };

  const visible = (filter === "all" ? tasks : tasks.filter((t) => t.model === filter))
    .sort((a, b) => (a.dueDate || "").localeCompare(b.dueDate || ""));
  const overdue = (t) => t.status !== "done" && t.dueDate && t.dueDate < todayISO();

  return (
    <div>
      <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
        {!restrictModel && (
          <div className="flex items-center gap-1.5 flex-wrap">
            <button onClick={() => setFilter("all")}
              className={`fs-11 font-mono uppercase px-2.5 py-1 rounded-lg border ${filter === "all" ? "c-border-accent c-accent" : "c-border c-muted"}`}>
              All
            </button>
            {models.map((m) => (
              <button key={m.name} onClick={() => setFilter(m.name)}
                className={`fs-11 font-mono uppercase px-2.5 py-1 rounded-lg border ${filter === m.name ? "c-border-accent c-accent" : "c-border c-muted"}`}>
                {m.name}
              </button>
            ))}
          </div>
        )}
        {restrictModel && <span className="fs-11 font-mono uppercase c-accent">{restrictModel}'s tasks</span>}
        <button onClick={() => setAdding(true)}

// ---------- calendar ----------

function CalendarView({ cards, tasks, onNavigate, restrictModel }) {
  const [cursor, setCursor] = useState(() => {
    const t = new Date();
    return { year: t.getFullYear(), month: t.getMonth() };
  });
  const [selected, setSelected] = useState(todayISO());

  const first = new Date(cursor.year, cursor.month, 1);
  const startOffset = (first.getDay() + 6) % 7; // Monday-first
  const daysInMonth = new Date(cursor.year, cursor.month + 1, 0).getDate();
  const monthLabel = first.toLocaleDateString("en-US", { month: "long", year: "numeric" });

  const scopedCards = restrictModel ? cards.filter((c) => c.model === restrictModel) : cards;
  const scopedTasks = restrictModel ? tasks.filter((t) => t.model === restrictModel) : tasks;

  const itemsByDate = {};
  scopedCards.forEach((c) => {
    if (!c.deadline) return;
    (itemsByDate[c.deadline] ||= []).push({ type: "scene", label: c.title, color: STAGES.find((s) => s.id === c.stage)?.color, model: c.model });
  });
  scopedTasks.forEach((t) => {
    if (!t.dueDate || t.status === "done") return;
    (itemsByDate[t.dueDate] ||= []).push({ type: "task", label: t.title, color: "#8B93A1", model: t.model });
  });

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const shiftMonth = (delta) => {
    let m = cursor.month + delta, y = cursor.year;
    if (m < 0) { m = 11; y -= 1; } else if (m > 11) { m = 0; y += 1; }
    setCursor({ year: y, month: m });
  };

  const dayISO = (d) => `${cursor.year}-${String(cursor.month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  return (
    <div className="grid grid-cols-1 lg:grid-cols-5 gap-4">
      <div className="lg:col-span-3 c-bg-surface border c-border rounded-xl p-4">
        <div className="flex items-center justify-between mb-4">
          <span className="fs-13 c-text font-medium">{monthLabel}</span>
          <div className="flex gap-1">
            <button onClick={() => shiftMonth(-1)} className="p-1 rounded-lg border c-border c-muted hover-accent-text hover-border-accent"><ChevronLeft size={14} /></button>
            <button onClick={() => shiftMonth(1)} className="p-1 rounded-lg border c-border c-muted hover-accent-text hover-border-accent"><ChevronRight size={14} /></button>
          </div>
        </div>
        <div className="grid grid-cols-7 gap-1 mb-1">
          {["Mo", "Tu", "We", "Th", "Fr", "Sa", "Su"].map((d) => (
            <div key={d} className="fs-9 font-mono uppercase c-faint text-center py-1">{d}</div>
          ))}
        </div>
        <div className="grid grid-cols-7 gap-1">
          {cells.map((d, i) => {
            if (!d) return <div key={i} />;
            const iso = dayISO(d);
            const items = itemsByDate[iso] || [];
            const isToday = iso === todayISO();
            const isSelected = iso === selected;
            return (
              <button key={i} onClick={() => setSelected(iso)}
                className={`aspect-square rounded-lg border p-1 flex flex-col items-start text-left transition-colors ${isSelected ? "c-border-accent" : "c-border"} ${isToday ? "c-bg-accent-a0" : "hover-bg-app"}`}>
                <span className={`fs-10 font-mono ${isToday ? "c-accent" : "c-muted"}`}>{d}</span>
                <div className="flex flex-wrap gap-0.5 mt-auto">
                  {items.slice(0, 3).map((it, idx) => (
                    <span key={idx} style={{ backgroundColor: it.color }} className="w-1.5 h-1.5 rounded-full" />
                  ))}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div className="lg:col-span-2 c-bg-surface border c-border rounded-xl p-4">
        <div className="flex items-center justify-between mb-3">
          <span className="fs-11 uppercase tracking-widest c-muted font-mono">{fmtDay(selected) || "—"}</span>
          <button onClick={() => onNavigate("content")} className="fs-11 font-mono uppercase c-accent hover:underline">Board →</button>
        </div>
        {(itemsByDate[selected] || []).length === 0 ? (
          <div className="fs-11 c-faint font-mono italic py-6 text-center">nothing scheduled</div>
        ) : (
          <div className="space-y-2">
            {(itemsByDate[selected] || []).map((it, idx) => (
              <div key={idx} className="flex items-center gap-2 text-xs">
                {it.type === "task" ? <CheckSquare size={12} className="c-idea flex-shrink-0" /> : <Circle size={8} fill={it.color} color={it.color} className="flex-shrink-0" />}
                <span className="c-text truncate flex-1">{it.label || "Untitled"}</span>
                <span className="c-muted font-mono fs-10">{it.model || "—"}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function LoginScreen({ models, settings, onLogin, onRegisterPassword }) {
  const [tab, setTab] = useState("team");
  const [teamAgency, setTeamAgency] = useState(null);
  const [teamPin, setTeamPin] = useState("");
  const [creatorName, setCreatorName] = useState("");
  const [creatorPassword, setCreatorPassword] = useState("");
  const [error, setError] = useState("");

  const submitTeam = () => {
    const required = (teamAgency === "US" ? settings.adminPinUS : settings.adminPinCZ) || "";
    if (required && teamPin !== required) { setError("Wrong PIN."); return; }
    onLogin({ role: "admin", name: "Team", agency: teamAgency });
  };

  const matchedModel = models.find((mm) => mm.name.trim().toLowerCase() === creatorName.trim().toLowerCase());
  const needsRegistration = creatorName.trim() && matchedModel && !matchedModel.pin;

  const submitCreator = async () => {
    const typed = creatorName.trim().toLowerCase();
    const m = models.find((mm) => mm.name.trim().toLowerCase() === typed);
    if (!m) { setError("No account with that name. Ask your manager to add you first."); return; }
    if (!m.pin) {
      if (!creatorPassword) { setError("Choose a password to finish setting up your account."); return; }
      await onRegisterPassword(m.name, creatorPassword);
      onLogin({ role: "creator", name: m.name, agency: m.agency || "CZ" });
      return;
    }
    if (creatorPassword !== m.pin) { setError("Wrong name or password."); return; }
    onLogin({ role: "creator", name: m.name, agency: m.agency || "CZ" });
  };

  return (
    <div className="min-h-screen c-bg-app flex items-center justify-center px-4" style={{ fontFamily: "Inter, sans-serif" }}>
      <style>{fontImport}</style>
      <div className="w-full max-w-sm">
        <div className="flex items-center justify-center gap-2 mb-8">
          <Clapperboard size={22} className="c-accent" />
          <span className="text-2xl font-extrabold tracking-tight c-text">AGENCY OS</span>
        </div>

        <div className="flex gap-1.5 c-bg-surface border c-border rounded-lg p-1 mb-5">
          <button onClick={() => { setTab("team"); setTeamAgency(null); setError(""); }}
            className={`flex-1 flex items-center justify-center gap-1.5 fs-11 font-mono uppercase py-2 rounded-lg ${tab === "team" ? "c-bg-accent c-onaccent font-semibold" : "c-muted"}`}>
            <ShieldCheck size={13} /> Team
          </button>
          <button onClick={() => { setTab("creator"); setError(""); }}
            className={`flex-1 flex items-center justify-center gap-1.5 fs-11 font-mono uppercase py-2 rounded-lg ${tab === "creator" ? "c-bg-accent c-onaccent font-semibold" : "c-muted"}`}>
            <UserCircle2 size={13} /> Creator
          </button>
        </div>

        <div className="c-bg-surface border c-border rounded-xl p-5">
          {tab === "team" ? (
            !teamAgency ? (
              <>
                <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-2">Which agency?</label>
                <div className="flex gap-2">
                  <button onClick={() => setTeamAgency("CZ")}
                    className="flex-1 py-3 rounded-lg border c-border c-text text-sm font-semibold hover-border-accent">
                    🇨🇿 CZ Team
                  </button>
                  <button onClick={() => setTeamAgency("US")}
                    className="flex-1 py-3 rounded-lg border c-border c-text text-sm font-semibold hover-border-accent">
                    🇺🇸 US Team
                  </button>
                </div>
              </>
            ) : (
              <>
                <div className="flex items-center justify-between mb-3">
                  <label className="fs-10 uppercase tracking-wide c-muted font-mono">
                    {teamAgency} PIN
                  </label>
                  <button onClick={() => { setTeamAgency(null); setTeamPin(""); setError(""); }} className="fs-10 font-mono c-faint hover-accent-text">
                    ← switch
                  </button>
                </div>
                <input type="password" value={teamPin} onChange={(e) => setTeamPin(e.target.value)}
                  onKeyDown={(e) => e.key === "Enter" && submitTeam()} autoFocus
                  className="w-full c-bg-app border c-border rounded-lg px-2.5 py-2.5 text-sm c-text mb-4 outline-none focus-border-accent" />
                <button onClick={submitTeam}
                  className="w-full py-2.5 rounded-lg c-bg-accent c-onaccent text-xs font-mono uppercase tracking-wide font-semibold hover-bg-accent2">
                  Enter dashboard
                </button>
              </>
            )
          ) : (
            <>
              <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">Your name</label>
              <input value={creatorName} onChange={(e) => { setCreatorName(e.target.value); setError(""); }}
                placeholder="Type your name" autoFocus
                className="w-full c-bg-app border c-border rounded-lg px-2.5 py-2.5 text-sm c-text mb-3 outline-none focus-border-accent" />
              <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">
                {needsRegistration ? "Choose a password" : "Password"}
              </label>
              <input type="password" value={creatorPassword} onChange={(e) => setCreatorPassword(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && submitCreator()}
                className="w-full c-bg-app border c-border rounded-lg px-2.5 py-2.5 text-sm c-text mb-1 outline-none focus-border-accent" />
              {needsRegistration && (
                <p className="fs-10 c-accent font-mono mb-3">First time here — this sets your password for next time.</p>
              )}
              <button onClick={submitCreator}
                className={`w-full py-2.5 rounded-lg c-bg-accent c-onaccent text-xs font-mono uppercase tracking-wide font-semibold hover-bg-accent2 ${needsRegistration ? "mt-3" : "mt-3"}`}>
                {needsRegistration ? "Create password & enter" : "Enter"}
              </button>
            </>
          )}
          {error && <p className="c-warn text-xs font-mono text-center mt-3">{error}</p>}
        </div>
        <p className="fs-10 c-faint font-mono text-center mt-4">
          Password is a convenience gate for this internal tool, not encrypted security.
        </p>
      </div>
    </div>
  );
}

  connected: { label: "Connected", color: "#6FB07F" },

function SettingsPanel({ settings, persistSettings, integrations, persistIntegrations, agency }) {
  const [pinCZ, setPinCZ] = useState(settings.adminPinCZ || "");
  const [pinUS, setPinUS] = useState(settings.adminPinUS || "");
  const [saved, setSaved] = useState(false);
  const save = async () => {
    await persistSettings({
      ...settings,
      adminPinCZ: pinCZ.replace(/\D/g, "").slice(0, 4),
      adminPinUS: pinUS.replace(/\D/g, "").slice(0, 4),
    });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const list = (integrations && integrations.length ? integrations : DEFAULT_INTEGRATIONS)
    .filter((i) => DEFAULT_INTEGRATIONS.some((d) => d.id === i.id))
    .filter((i) => (i.agency || "CZ") === agency);
  const updateIntegration = async (id, patch) => {
    const next = list.map((i) => (i.id === id ? { ...i, ...patch } : i));
    await persistIntegrations(next);
  };

  return (
    <div className="max-w-lg">
      <div className="mb-8">
        <p className="c-muted text-sm mb-5">Set the team PIN for each agency, used on the login screen.</p>
        <div className="grid grid-cols-2 gap-3 max-w-sm mb-4">

          </div>
          <div>
            <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">🇺🇸 US PIN</label>
            <input value={pinUS} onChange={(e) => setPinUS(e.target.value.replace(/\D/g, "").slice(0, 4))} placeholder="e.g. 1234"
              className="w-full c-bg-surface border c-border rounded-lg px-2.5 py-2.5 text-sm c-text outline-none focus-border-accent" />
          </div>
        </div>
        <button onClick={save}
          className="py-2.5 px-4 rounded-lg c-bg-accent c-onaccent text-xs font-mono uppercase tracking-wide font-semibold hover-bg-accent2">
          Save
        </button>
        {saved && <p className="c-success text-xs font-mono mt-3">Saved.</p>}

      </div>

      <div className="border-t c-border pt-6 mb-8">
        <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">Creator Bible URL</label>

        </p>
      </div>

      <div className="border-t c-border pt-6">
        <div className="flex items-center gap-2 mb-1.5">
          <Plug size={15} className="c-accent" />
          <span className="text-sm c-text font-medium">Integrations</span>
        </div>
        <p className="c-muted text-xs mb-4">Team-only. Placeholders for now, wired up one at a time as real API access comes through.</p>

        <div className="space-y-2.5">
          {list.map((i) => {
            const st = STATUS_STYLES[i.status] || STATUS_STYLES.planned;
            return (
              <div key={i.id} className="c-bg-surface border c-border rounded-xl p-3">
                <div className="flex items-center justify-between mb-1.5">
                  <span className="text-sm c-text">{i.name}</span>
                  <span style={{ color: st.color, borderColor: st.color }} className="fs-9 font-mono uppercase border px-1.5 py-0.5 rounded-lg">
                    {st.label}
                  </span>
                </div>
                <p className="fs-10 c-muted font-mono mb-2">{i.help}</p>
                <input value={i.note} onChange={(e) => updateIntegration(i.id, { note: e.target.value })}
                  placeholder="API key / account note (kept in this workspace only)"
                  className="w-full c-bg-app border c-border rounded-lg px-2.5 py-1.5 text-xs c-text outline-none focus-border-accent" />
              </div>
            );
          })}
        </div>
        <p className="fs-10 c-faint font-mono mt-4">
          Nothing here calls out to these services yet, it's a place to hold notes and keys until each is actually wired in.
        </p>
      </div>
    </div>
  );
}

function TrendManager({ trends, persistTrends }) {
  const [adding, setAdding] = useState(false);

  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");
  const [link, setLink] = useState("");

  const [showCZ, setShowCZ] = useState(true);
  const [showUS, setShowUS] = useState(true);
  const [filter, setFilter] = useState("all");

  const categories = Array.from(new Set(trends.map((t) => t.category).filter(Boolean)));

  const addTrend = async () => {
    if (!title.trim()) return;
    const entry = {
      id: uid(), showCZ, showUS, category: category.trim() || "General", title, description, link, weekOf,
      createdAt: Date.now(),
    };
    await persistTrends([...trends, entry]);
    setCategory(""); setTitle(""); setDescription(""); setLink(""); setShowCZ(true); setShowUS(true); setAdding(false);
  };
  const deleteTrend = async (id) => {
    await persistTrends(trends.filter((t) => t.id !== id));
  };

  const visible = [...trends]
    .filter((t) => filter === "all" || t.category === filter)
    .sort((a, b) => (b.weekOf || "").localeCompare(a.weekOf || "") || b.createdAt - a.createdAt);

  return (
    <div>
      <p className="c-muted text-sm mb-4">

          <button onClick={() => setFilter("all")}
            className={`fs-11 font-mono uppercase px-2.5 py-1 rounded-lg border ${filter === "all" ? "c-border-accent c-accent" : "c-border c-muted"}`}>
            All
          </button>

            <button key={c} onClick={() => setFilter(c)}
              className={`fs-11 font-mono uppercase px-2.5 py-1 rounded-lg border ${filter === c ? "c-border-accent c-accent" : "c-border c-muted"}`}>
              {c}
            </button>
          ))}
        </div>
        <button onClick={() => setAdding(true)}
          className="flex items-center gap-1.5 fs-11 font-mono uppercase tracking-wide c-bg-accent c-onaccent px-3 py-1.5 rounded-lg font-semibold hover-bg-accent2">
          <Plus size={13} /> Add trend
        </button>
      </div>

      {adding && (
        <div className="mb-5 c-bg-surface border c-border rounded-xl p-4 grid grid-cols-2 gap-3">
          <div className="col-span-2">
            <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">Title</label>

              className="w-full c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none focus-border-accent" />
          </div>
          <div>
            <label className="block fs-10 uppercase tracking-wide c-muted font-mono mb-1">Week of</label>
            <input type="date" value={weekOf} onChange={(e) => setWeekOf(e.target.value)}
              className="w-full c-bg-app border c-border rounded-lg px-2.5 py-2 text-sm c-text outline-none focus-border-accent" />
          </div>
          <div>

function CreatorTrending({ trends, agency }) {
  const [filter, setFilter] = useState("all");
  const mine = trends.filter((t) => (agency === "US" ? t.showUS : t.showCZ))
    .sort((a, b) => (b.weekOf || "").localeCompare(a.weekOf || "") || b.createdAt - a.createdAt);

            <div key={g.weekOf}>

                    <div className="flex items-center gap-2 mb-1.5">
                      <Badge color="#E5335C">{t.category}</Badge>
                    </div>
                    <div className="c-text text-sm font-medium mb-1">{t.title}</div>
                    {t.description && <div className="c-muted text-xs mb-2">{t.description}</div>}
                    {t.link && <a href={t.link} target="_blank" rel="noopener noreferrer" className="fs-11 font-mono c-accent hover-accent-text">Watch example →</a>}
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );

// ---------- Neo (AI assistant) ----------

function NeoOrb({ thinking, speaking, onClick }) {
  const canvasRef = useRef(null);
  const rotRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    const dpr = window.devicePixelRatio || 1;
    const size = 480;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + "px";
    canvas.style.height = size + "px";
    ctx.scale(dpr, dpr);

    const N = 420;
    const points = [];
    const golden = Math.PI * (3 - Math.sqrt(5));
    for (let i = 0; i < N; i++) {
      const y = 1 - (i / (N - 1)) * 2;
      const radius = Math.sqrt(1 - y * y);
      const theta = golden * i;
      points.push({ x: Math.cos(theta) * radius, y, z: Math.sin(theta) * radius });
    }

    // Precompute edges once — local point distances never change (only the
    // rotation does), so this avoids an O(N^2) scan every animation frame.
    const nearEdges = [];
    for (let i = 0; i < points.length; i++) {
      for (let j = i + 1; j < points.length; j++) {
        const a = points[i], b = points[j];
        const d = Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
        if (d < 0.22) nearEdges.push([i, j]);
      }
    }
    // A fixed set of long "chord" connections crossing through the sphere's
    // volume, independent of distance — gives that tangled wireframe-globe look.
    const chordEdges = [];
    for (let k = 0; k < 700; k++) {
      chordEdges.push([Math.floor(Math.random() * N), Math.floor(Math.random() * N)]);
    }

    let raf;
    const render = () => {
      const speed = thinking ? 0.014 : 0.005;
      rotRef.current += speed;
      const r = rotRef.current;
      ctx.clearRect(0, 0, size, size);
      const cx = size / 2, cy = size / 2, R = 178;

      const projected = points.map((p) => {
        const cosR = Math.cos(r), sinR = Math.sin(r);
        const x1 = p.x * cosR - p.z * sinR;
        const z1 = p.x * sinR + p.z * cosR;
        const scale = 1 / (1.6 - z1 * 0.6);
        return { x: cx + x1 * R * scale, y: cy + p.y * R * scale, z: z1, scale };
      });

      ctx.lineWidth = 0.5;
      const drawEdges = (edges, baseAlpha) => {
        for (const [i, j] of edges) {
          const avgZ = (projected[i].z + projected[j].z) / 2;
          const alpha = baseAlpha + avgZ * 0.12;
          if (alpha <= 0.02) continue;
          ctx.strokeStyle = `rgba(0,255,120,${Math.max(0.02, alpha)})`;
          ctx.beginPath();
          ctx.moveTo(projected[i].x, projected[i].y);
          ctx.lineTo(projected[j].x, projected[j].y);
          ctx.stroke();
        }
      };
      drawEdges(chordEdges, thinking ? 0.06 : 0.035);
      drawEdges(nearEdges, thinking ? 0.24 : 0.14);

      projected.forEach((p) => {
        const alpha = 0.35 + p.z * 0.4;
        ctx.fillStyle = `rgba(60,255,150,${Math.max(0.2, alpha)})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.3 * p.scale, 0, Math.PI * 2);
        ctx.fill();
      });

      // Animated "eye" at the core — iris glow, dilating pupil, radiating rays.
      const eyeR = 34 + Math.sin(r * 6) * 1.5;
      const pupilR = thinking ? 14 + Math.sin(r * 10) * 2 : 9;

      // outer glow
      const glow = ctx.createRadialGradient(cx, cy, 2, cx, cy, eyeR * 2.2);
      glow.addColorStop(0, "rgba(120,255,190,0.55)");
      glow.addColorStop(0.5, "rgba(0,255,120,0.18)");
      glow.addColorStop(1, "rgba(0,255,120,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, eyeR * 2.2, 0, Math.PI * 2);
      ctx.fill();

      // light rays
      const rayCount = 14;
      for (let i = 0; i < rayCount; i++) {
        const angle = (i / rayCount) * Math.PI * 2 + r * 0.6;
        const len = eyeR * (thinking ? 3.4 : 2.6) * (0.7 + 0.3 * Math.sin(r * 4 + i));
        const x1 = cx + Math.cos(angle) * eyeR * 1.1;
        const y1 = cy + Math.sin(angle) * eyeR * 1.1;
        const x2 = cx + Math.cos(angle) * len;
        const y2 = cy + Math.sin(angle) * len;
        ctx.strokeStyle = `rgba(120,255,190,${thinking ? 0.14 : 0.07})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      // iris ring
      ctx.strokeStyle = "rgba(60,255,150,0.9)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, eyeR, 0, Math.PI * 2);
      ctx.stroke();

      // iris fill
      const iris = ctx.createRadialGradient(cx, cy, pupilR, cx, cy, eyeR);
      iris.addColorStop(0, "rgba(180,255,220,0.9)");
      iris.addColorStop(1, "rgba(0,255,120,0.15)");
      ctx.fillStyle = iris;
      ctx.beginPath();
      ctx.arc(cx, cy, eyeR, 0, Math.PI * 2);
      ctx.fill();

      // pupil
      ctx.fillStyle = "#010A06";
      ctx.beginPath();
      ctx.arc(cx, cy, pupilR, 0, Math.PI * 2);
      ctx.fill();

      raf = requestAnimationFrame(render);
    };
    render();
    return () => cancelAnimationFrame(raf);
  }, [thinking]);

  return (
    <div style={{ transform: speaking ? "scale(1.12)" : "scale(1)", transition: "transform 0.35s ease" }}>
      <canvas ref={canvasRef} onClick={onClick} className="block mx-auto cursor-pointer" />
    </div>
  );
}

function NeoPage({ agency, session, onNavigate, onSignOut, cards, tasks, models, stats, reels, trends }) {
  const [messages, setMessages] = useState([]);
  const [thinking, setThinking] = useState(false);
  const [queriesToday, setQueriesToday] = useState(0);
  const [listening, setListening] = useState(false);
  const [heard, setHeard] = useState("");
  const [speaking, setSpeaking] = useState(false);
  const speakingRef = useRef(false);
  const scrollRef = useRef(null);
  const recognitionRef = useRef(null);
  const thinkingRef = useRef(false);
  const speechSupported = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, thinking]);

  const requestIdRef = useRef(0);

  const send = async (text) => {
    if (!text || thinkingRef.current) return;
    thinkingRef.current = true;
    setThinking(true);
    const myRequestId = ++requestIdRef.current;
    setMessages((m) => [...m, { role: "user", text }]);
    try {
      const { data, error } = await supabaseClient.functions.invoke("neo-assistant", {
        body: {
          message: text,
          agency,
          context: {
            cardCount: cards.length,
            openTasks: tasks.filter((t) => t.status !== "done").length,
            overdueTasks: tasks.filter((t) => t.status !== "done" && t.dueDate && t.dueDate < todayISO()).length,
            modelNames: models.map((m) => m.name),
            // Per-model earnings/subs history, most recent week first, so Neo can
            // answer "how much did X earn" or "who's growing fastest" directly.
            earningsByModel: models.map((m) => ({
              model: m.name,
              weeks: stats.filter((s) => s.model === m.name)
                .sort((a, b) => (b.weekOf || "").localeCompare(a.weekOf || ""))
                .slice(0, 6)
                .map((s) => ({ weekOf: s.weekOf, ofEarnings: s.ofEarnings, ofSubs: s.ofSubs, igFollowers: s.igFollowers, igReach: s.igReach })),
            })),
            // Best/worst performing reels so Neo can say what's working.
            topReels: [...(reels || [])].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 12)
              .map((r) => ({ model: r.model, title: r.title, weekOf: r.weekOf, views: r.views, likes: r.likes, shares: r.shares, comments: r.comments })),
            recentTrends: trends.filter((t) => (agency === "US" ? t.showUS : t.showCZ)).slice(-6).map((t) => ({ title: t.title, category: t.category })),
          },
        },
      });
      if (error) throw error;
      if (myRequestId !== requestIdRef.current) return; // cancelled — ignore this response
      const reply = data?.reply || "...";
      setMessages((m) => [...m, { role: "neo", text: reply }]);
      setQueriesToday((n) => n + 1);
      if (window.speechSynthesis) {
        const utter = new window.SpeechSynthesisUtterance(reply);
        utter.rate = 1.02;
        utter.onstart = () => { setSpeaking(true); speakingRef.current = true; };
        utter.onend = () => { setSpeaking(false); speakingRef.current = false; };
        utter.onerror = () => { setSpeaking(false); speakingRef.current = false; };
        window.speechSynthesis.speak(utter);
      }
    } catch (e) {
      if (myRequestId !== requestIdRef.current) return;
      setMessages((m) => [...m, { role: "neo", text: "Couldn't reach Neo — check the neo-assistant function and GROQ_API_KEY secret in Supabase." }]);
    } finally {
      if (myRequestId === requestIdRef.current) {
        thinkingRef.current = false;
        setThinking(false);
      }
    }
  };

  // Clicking the orb: if Neo is currently thinking, cancel it (matches "click
  // the orb to stop"). If idle, start a one-shot listen — no wake word needed,
  // just talk right after clicking.
  const orbClick = () => {
    if (thinking) {
      requestIdRef.current++; // invalidates the in-flight response
      thinkingRef.current = false;
      setThinking(false);
      setMessages((m) => [...m, { role: "neo", text: "(stopped)" }]);
      return;
    }
    if (!speechSupported) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const oneShot = new SR();
    oneShot.lang = "en-US";
    oneShot.continuous = false;
    oneShot.interimResults = false;
    oneShot.maxAlternatives = 1;
    oneShot.onresult = (e) => {
      const text = e.results[0][0].transcript.trim();
      setHeard(text);
      if (text) send(text);
    };
    try { oneShot.start(); } catch {}
  };

  // Always-on listener: runs one recognition "session" at a time (continuous
  // mode was unreliable — isFinal often never fired on longer sentences).
  // Each session ends on a natural pause, which reliably finalizes, then we
  // immediately restart a new session so it's always ready again.
  useEffect(() => {
    if (!speechSupported) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = "en-US";
    rec.continuous = false;
    rec.interimResults = true;
    rec.maxAlternatives = 1;
    let stoppedByUs = false;

    rec.onstart = () => setListening(true);
    rec.onend = () => {
      setListening(false);
      if (stoppedByUs) return;
      const tryRestart = () => {
        if (stoppedByUs) return;
        if (speakingRef.current || thinkingRef.current) { setTimeout(tryRestart, 300); return; }
        try { rec.start(); } catch {}
      };
      tryRestart();
    };
    rec.onerror = () => { /* mic denied, or nothing heard — onend will retry */ };
    rec.onresult = (e) => {
      const res = e.results[e.results.length - 1];
      const transcript = res[0].transcript.trim();
      setHeard(transcript);
      if (!res.isFinal) return;
      if (transcript) send(transcript);
    };

    recognitionRef.current = rec;
    try { rec.start(); } catch {}
    return () => { stoppedByUs = true; try { rec.stop(); } catch {} };
  }, [speechSupported]);

  const neoGreen = "#3CFF96";
  const neoDim = "#0B1A10";
  const decisionsToday = queriesToday;
  const retrievals24h = cards.length + tasks.length;

  return (
    <div className="-m-6 p-6 rounded-2xl" style={{ background: "#050806", minHeight: "calc(100vh - 160px)" }}>
      <div className="flex items-center justify-between mb-8 fs-10 font-mono uppercase tracking-widest" style={{ color: neoGreen, opacity: 0.55 }}>
        <span>NEO ENGINE / LIVE</span>
        <span style={{ opacity: 0.7 }}>● all systems online</span>
      </div>

      <div className="flex items-center justify-center gap-16 flex-wrap">
        <div className="max-w-xs">
          <div className="fs-11 font-mono uppercase tracking-widest mb-2" style={{ color: neoGreen, opacity: 0.5 }}>
            {!speechSupported ? "voice needs chrome" : listening ? "● listening for \u201cneo\u201d" : "mic off"}
          </div>
          <div className="fs-13 font-mono italic" style={{ color: neoGreen, opacity: 0.8 }}>
            {thinking ? "Neo is thinking — click the orb to stop." : "Click the orb, or just say \u201c...neo\u201d, to ask something."}
          </div>
          {heard && (
            <div className="fs-11 font-mono mt-3 italic" style={{ color: neoGreen, opacity: 0.4 }}>
              heard: "{heard}"
            </div>
          )}
        </div>

        <NeoOrb thinking={thinking} speaking={speaking} onClick={orbClick} />

        <div className="text-right">
          <div className="mb-6">
            <div className="text-3xl font-mono font-bold" style={{ color: neoGreen }}>{retrievals24h}</div>
            <div className="fs-10 font-mono uppercase tracking-widest" style={{ color: neoGreen, opacity: 0.5 }}>retrievals 24h</div>
          </div>
          <div>
            <div className="text-5xl font-mono font-bold" style={{ color: neoGreen }}>{decisionsToday}</div>
            <div className="fs-10 font-mono uppercase tracking-widest" style={{ color: neoGreen, opacity: 0.5 }}>decisions today</div>
          </div>
        </div>
      </div>

      <div className="w-full max-w-xl mx-auto mt-10 rounded-2xl p-4" style={{ background: neoDim, border: `1px solid ${neoGreen}33` }}>
        <div ref={scrollRef} className="max-h-96 overflow-y-auto space-y-3 pr-1">
          {messages.length === 0 && (
            <div className="fs-12 font-mono italic text-center py-6" style={{ color: neoGreen, opacity: 0.4 }}>
              Ask about your {agency} pipeline, tasks, or stats.
            </div>
          )}
          {messages.map((m, i) => (
            <div key={i} className={`text-sm ${m.role === "user" ? "text-right" : ""}`}>
              <div className="inline-block px-3 py-2 rounded-xl max-w-[85%] font-mono"
                style={m.role === "user"
                  ? { background: neoGreen, color: "#04120A" }
                  : { background: "#0F2418", color: neoGreen, border: `1px solid ${neoGreen}33` }}>
                {m.text}
              </div>
            </div>
          ))}
          {thinking && (
            <div className="text-sm">
              <div className="inline-block px-3 py-2 rounded-xl fs-12 font-mono" style={{ background: "#0F2418", color: neoGreen, opacity: 0.7, border: `1px solid ${neoGreen}33` }}>
                thinking…
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function NotificationBell({ model, cards, tasks, trends, agency, models, persistModels, onNavigate }) {
  const [open, setOpen] = useState(false);
  const [frozen, setFrozen] = useState(null);
  const lastSeen = model?.notifLastSeen || 0;
  const myName = model?.name;

  const newIdeas = cards.filter((c) => c.model === myName && c.source === "team" && c.createdAt > lastSeen);
  const newCalendar = tasks.filter((t) => t.model === myName && t.createdAt > lastSeen);
  const newTrends = trends.filter((t) => (agency === "US" ? t.showUS : t.showCZ) && t.createdAt > lastSeen);
  const live = { newIdeas, newCalendar, newTrends };
  const total = newIdeas.length + newCalendar.length + newTrends.length;

  const toggle = async () => {
    if (!open) {
      setFrozen(live); // snapshot what's new before marking as seen, so items don't disappear mid-view
      setOpen(true);
      if (total > 0) {
        await persistModels(models.map((m) => (m.name === myName ? { ...m, notifLastSeen: Date.now() } : m)));
      }
    } else {
      setOpen(false);
    }
  };

  const shown = frozen || live;

  return (
    <div className="relative">
      <button onClick={toggle} className="relative p-1.5 rounded-lg c-muted hover-text-primary hover-bg-surface transition-colors">
        <Bell size={16} />
        {total > 0 && (
          <span className="absolute -top-0.5 -right-0.5 min-w-[15px] h-[15px] px-1 rounded-full c-bg-accent c-onaccent fs-9 font-mono font-bold flex items-center justify-center">
            {total > 9 ? "9+" : total}
          </span>
        )}
      </button>
      {open && (
        <div className="absolute right-0 top-full mt-2 w-72 c-bg-surface border c-border rounded-xl shadow-2xl z-50 p-2 max-h-80 overflow-y-auto">
          {shown.newIdeas.length + shown.newCalendar.length + shown.newTrends.length === 0 && (
            <div className="fs-12 c-faint font-mono italic text-center py-6">You're all caught up.</div>
          )}
          {shown.newIdeas.map((c) => (
            <button key={c.id} onClick={() => { onNavigate("content"); setOpen(false); }}
              className="w-full text-left px-2.5 py-2 rounded-lg hover-bg-app transition-colors">
              <div className="fs-10 font-mono uppercase c-accent">New idea</div>
              <div className="fs-12 c-text">{c.title || "Untitled scene"}</div>
            </button>
          ))}
          {shown.newCalendar.map((t) => (
            <button key={t.id} onClick={() => { onNavigate("calendar"); setOpen(false); }}
              className="w-full text-left px-2.5 py-2 rounded-lg hover-bg-app transition-colors">
              <div className="fs-10 font-mono uppercase c-success">Calendar</div>
              <div className="fs-12 c-text">{t.title}{t.dueDate ? ` — due ${fmtDay(t.dueDate)}` : ""}</div>
            </button>
          ))}
          {shown.newTrends.map((t) => (
            <button key={t.id} onClick={() => { onNavigate("trending"); setOpen(false); }}
              className="w-full text-left px-2.5 py-2 rounded-lg hover-bg-app transition-colors">
              <div className="fs-10 font-mono uppercase" style={{ color: "#E2725B" }}>New trend</div>
              <div className="fs-12 c-text">{t.title}</div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function StatsManager({ stats, persistStats, models, reels, persistReels }) {

  const [reelWeekOf, setReelWeekOf] = useState(todayISO());

  const [reelShares, setReelShares] = useState("");
  const [reelComments, setReelComments] = useState("");

  const addEntry = async () => {
    if (!model || !weekOf) return;
    const entry = {
      id: uid(), model, weekOf,
      ofEarnings: Number(ofEarnings) || 0, earningsGoal: Number(earningsGoal) || 0, ofSubs: Number(ofSubs) || 0,
      igFollowers: Number(igFollowers) || 0, igReach: Number(igReach) || 0,
      createdAt: Date.now(),
    };
    await persistStats([...stats, entry]);
    setModel(""); setOfEarnings(""); setEarningsGoal(""); setOfSubs(""); setIgFollowers(""); setIgReach(""); setAdding(false);
  };

  const deleteEntry = async (id) => {

  const addReel = async () => {

      shares: Number(reelShares) || 0, comments: Number(reelComments) || 0,
      createdAt: Date.now(),
    };
    await persistReels([...reels, entry]);
    setReelModel(""); setReelTitle(""); setReelLink(""); setReelViews(""); setReelLikes(""); setReelShares(""); setReelComments(""); setReelAdding(false);

                <th className="text-right py-2 px-3">IG reach</th>
                <th className="py-2 pl-3"></th>
              </tr>
            </thead>
            <tbody>
              {visible.map((s) => (
                <tr key={s.id} className="border-b c-border c-text group">
                  <td className="py-2 pr-3 font-mono">{fmtDay(s.weekOf)}</td>
                  <td className="py-2 px-3 text-right font-mono">${s.ofEarnings.toLocaleString()}</td>

// ---------- creator dashboard ----------

function DeltaTag({ current, previous }) {
  if (previous === undefined || previous === null) return null;
  const diff = current - previous;
  const pct = previous !== 0 ? (diff / previous) * 100 : 0;
  if (diff === 0) return <span className="flex items-center gap-0.5 fs-10 font-mono c-muted"><Minus size={10} />0%</span>;
  const up = diff > 0;
  return (
    <span className={`flex items-center gap-0.5 fs-10 font-mono ${up ? "c-success" : "c-warn"}`}>
      {up ? <TrendingUp size={10} /> : <TrendingDown size={10} />}
      {up ? "+" : ""}{pct.toFixed(0)}%
    </span>
  );
}

function StatCardBig({ icon: Icon, label, value, delta, color }) {
  return (
    <div className="c-bg-surface border c-border rounded-xl p-4 flex-1 minw-150">
      <div className="flex items-center justify-between mb-2">
        <Icon size={15} style={{ color }} />
        {delta}
      </div>
      <div className="fs-10 uppercase tracking-widest c-muted font-mono mb-1">{label}</div>
      <div className="text-xl md:text-2xl font-semibold c-text">{value}</div>
    </div>
  );
}

function GoalCard({ latest }) {
  const goal = latest.earningsGoal || 0;
  const actual = latest.ofEarnings || 0;
  if (!goal) return null;
  const pct = Math.min(150, Math.round((actual / goal) * 100));
  const hit = actual >= goal;
  return (
    <div className="c-bg-surface border rounded-xl p-5 mb-6" style={{ borderColor: hit ? "#6FB07F" : undefined }}>
      <div className="flex items-center justify-between mb-2">
        <span className="fs-11 uppercase tracking-widest c-muted font-mono">This week's earnings goal</span>
        {hit && <span className="fs-11 font-mono c-success uppercase tracking-wide">🔥 Goal hit!</span>}
      </div>
      <div className="flex items-baseline gap-2 mb-3">
        <span className="text-3xl font-extrabold c-text">${actual.toLocaleString()}</span>
        <span className="c-faint fs-12 font-mono">/ ${goal.toLocaleString()} goal</span>
      </div>
      <div className="h-3 c-bg-app rounded-full overflow-hidden">
        <div className="h-full rounded-full" style={{ width: `${Math.min(100, pct)}%`, backgroundColor: hit ? "#6FB07F" : "#E5335C", transition: "width 0.6s ease" }} />
      </div>
      <div className="fs-11 font-mono c-faint mt-1.5">{pct}% of goal{hit ? ", nice work" : ""}</div>
    </div>
  );
}

function ThisWeeksAsks({ tasks, restrictModel, onNavigate }) {
  const open = tasks.filter((t) => t.model === restrictModel && t.status !== "done")
    .sort((a, b) => (a.dueDate || "").localeCompare(b.dueDate || ""));
  if (open.length === 0) return null;
  return (
    <div className="c-bg-surface border c-border rounded-xl p-4 mb-6">
      <div className="flex items-center justify-between mb-3">
        <span className="fs-11 uppercase tracking-widest c-muted font-mono">This week, we need from you</span>
        <button onClick={() => onNavigate("tasks")} className="fs-11 font-mono uppercase c-accent hover:underline">All tasks →</button>
      </div>
      <div className="space-y-2">
        {open.slice(0, 5).map((t) => (
          <div key={t.id} className="flex items-center gap-2 text-sm">
            <CheckSquare size={14} className="c-faint flex-shrink-0" />
            <span className="c-text flex-1">{t.title}</span>
            {t.dueDate && <span className="fs-10 font-mono c-faint">{fmtDay(t.dueDate)}</span>}
          </div>
        ))}
      </div>
    </div>
  );
}

function CreatorDashboard({ stats, tasks, restrictModel, onNavigate, bufferDailyStats }) {
  const mine = stats.filter((s) => s.model === restrictModel).sort((a, b) => b.weekOf.localeCompare(a.weekOf));
  const latest = mine[0];
  const prev = mine[1];

  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const sevenDaysAgoStr = sevenDaysAgo.toISOString().slice(0, 10);
  const myBufferRows = (bufferDailyStats || []).filter((r) => r.model === restrictModel && r.statDate >= sevenDaysAgoStr);
  const platformTotals = {};
  myBufferRows.forEach((r) => {
    const p = platformTotals[r.platform] || { platform: r.platform, impressions: 0, comments: 0, reactions: 0, reposts: 0, postCount: 0 };
    p.impressions += r.impressions; p.comments += r.comments; p.reactions += r.reactions; p.reposts += r.reposts; p.postCount += r.postCount;
    platformTotals[r.platform] = p;
  });
  const platformLabel = { ig: "Instagram", x: "X", tiktok: "TikTok", fb: "Facebook" };
  const bufferSection = Object.values(platformTotals).length > 0 && (
    <div className="flex gap-3 flex-wrap mb-6">
      {Object.values(platformTotals).map((p) => (
        <div key={p.platform} className="c-bg-surface border c-border rounded-xl px-4 py-3.5 flex-1 minw-180 hover-lift">
          <div className="fs-10 uppercase tracking-widest c-muted font-mono mb-2">This week on {platformLabel[p.platform] || p.platform}</div>
          <div className="flex gap-4">
            <div>
              <div className="text-xl font-semibold c-text"><CountUp value={p.impressions} /></div>
              <div className="fs-9 c-faint font-mono uppercase">impressions</div>
            </div>
            <div>
              <div className="text-xl font-semibold c-text"><CountUp value={p.comments} /></div>
              <div className="fs-9 c-faint font-mono uppercase">replies</div>
            </div>
            <div>
              <div className="text-xl font-semibold c-text"><CountUp value={p.reactions} /></div>
              <div className="fs-9 c-faint font-mono uppercase">reactions</div>
            </div>
            <div>
              <div className="text-xl font-semibold c-text"><CountUp value={p.postCount} /></div>
              <div className="fs-9 c-faint font-mono uppercase">posts</div>
            </div>
          </div>
        </div>
      ))}
    </div>
  );

  if (!latest) {
    return (
      <div>
        <ThisWeeksAsks tasks={tasks} restrictModel={restrictModel} onNavigate={onNavigate} />
        {bufferSection}
        <div className="fs-12 c-faint font-mono italic py-16 text-center border border-dashed c-border rounded-xl">
          No stats yet. Ask your manager to add this week's numbers.
        </div>
      </div>
    );
  }

  return (
    <div>
      <GoalCard latest={latest} />
      <ThisWeeksAsks tasks={tasks} restrictModel={restrictModel} onNavigate={onNavigate} />
      {bufferSection}

      <div className="flex gap-3 flex-wrap mb-6">
        <StatCardBig icon={DollarSign} label="OF earnings this week" value={`$${latest.ofEarnings.toLocaleString()}`}
          delta={<DeltaTag current={latest.ofEarnings} previous={prev?.ofEarnings} />} color="#6FB07F" />
        <StatCardBig icon={Users} label="OF subscribers" value={latest.ofSubs.toLocaleString()}
          delta={<DeltaTag current={latest.ofSubs} previous={prev?.ofSubs} />} color="#E5335C" />

          <table className="w-full text-xs">
            <thead>
              <tr className="c-muted font-mono uppercase fs-10 border-b c-border">

                <th className="text-right py-2 px-3">OF subs</th>

                <tr key={s.id} className="border-b c-border c-text">
                  <td className="py-2 pr-3 font-mono">{fmtDay(s.weekOf)}</td>
                  <td className="py-2 px-3 text-right font-mono">${s.ofEarnings.toLocaleString()}</td>

                  <td className="py-2 px-3 text-right font-mono">{s.igFollowers.toLocaleString()}</td>

            </tbody>

      </div>
      <p className="fs-10 c-faint font-mono mt-3">Entered manually by your manager each week.</p>
    </div>
  );
}

// ---------- creator onboarding (first login) ----------

function OnboardingScreen({ name, url, onContinue, onQuestionnaireReceived }) {
  const [received, setReceived] = useState(false);

  useEffect(() => {
    function handleMessage(event) {
      const data = event.data;
      if (!data || data.source !== "creator-bible") return;
      if (data.type === "submitted") {
        onQuestionnaireReceived(data.celyFormular || data.chatterSheet || "");
        setReceived(true);
        setTimeout(() => setReceived(false), 4000);
      } else if (data.type === "continue") {
        onContinue();
      }
    }
    window.addEventListener("message", handleMessage);
    return () => window.removeEventListener("message", handleMessage);
  }, [onContinue, onQuestionnaireReceived]);

  return (
    <div className="c-bg-app" style={{ fontFamily: "Inter, sans-serif", height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <style>{fontImport}</style>

      <div style={{ flex: 1, position: "relative" }}>
        {url ? (
          <iframe
            src={url}
            title="Creator Bible"
            style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: "none" }}
          />
        ) : (
          <div className="flex items-center justify-center h-full">
            <p className="fs-11 c-faint font-mono text-center px-4">(Creator Bible link not set yet, ask your manager.)</p>
          </div>
        )}
        {received && (
          <div className="c-bg-accent c-onaccent fs-11 font-mono uppercase tracking-wide px-3 py-2 rounded-lg"
            style={{ position: "absolute", top: 12, right: 12 }}>
            Saved to your profile ✓
          </div>
        )}
      </div>

      <div className="c-bg-panel px-4 py-2 flex-shrink-0" style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "16px" }}>
        {url && (
          <a href={url} target="_blank" rel="noopener noreferrer" className="fs-10 font-mono c-faint hover-accent-text">
            Not loading? Open directly →
          </a>
        )}
        <button onClick={onContinue} className="fs-10 font-mono c-faint hover-accent-text uppercase tracking-wide">
          Continue to my dashboard (testing only)
        </button>
      </div>
    </div>
  );
}

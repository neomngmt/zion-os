function CreatorDashboard({ stats, tasks, restrictModel, onNavigate, bufferDailyStats }) {
  const mine = stats.filter((s) => s.model === restrictModel).sort((a, b) => b.weekOf.localeCompare(a.weekOf));
  const latest = mine[0];
  const prev = mine[1];

  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const sevenDaysAgoStr = sevenDaysAgo.toISOString().slice(0, 10);
  const myBufferRows = (bufferDailyStats || []).filter((r) => r.model === restrictModel && r.statDate >= sevenDaysAgoStr);
  const platformTotals = {};
  myBufferRows.forEach((r) => {
    const p = platformTotals[r.platform] || { platform: r.platform, impressions: 0, comments: 0, reactions: 0, reposts: 0, postCount: 0 };
    p.impressions += r.impressions; p.comments += r.comments; p.reactions += r.reactions; p.reposts += r.reposts; p.postCount += r.postCount;

    <div className="flex gap-3 flex-wrap mb-6">

        <div key={p.platform} className="c-bg-surface border c-border rounded-xl px-4 py-3.5 flex-1 minw-180 hover-lift">

        {bufferSection}
        <div className="fs-12 c-faint font-mono italic py-16 text-center border border-dashed c-border rounded-xl">

        <StatCardBig icon={Users} label="OF subscribers" value={latest.ofSubs.toLocaleString()}

        <StatCardBig icon={Instagram} label="IG followers" value={latest.igFollowers.toLocaleString()}

function OnboardingScreen({ name, url, onContinue, onQuestionnaireReceived }) {
  const [received, setReceived] = useState(false);

  useEffect(() => {
    function handleMessage(event) {
      const data = event.data;
      if (!data || data.source !== "creator-bible") return;
      if (data.type === "submitted") {
        onQuestionnaireReceived(data.celyFormular || data.chatterSheet || "");
        setReceived(true);
        setTimeout(() => setReceived(false), 4000);
      } else if (data.type === "continue") {
        onContinue();
      }
    }
    window.addEventListener("message", handleMessage);
    return () => window.removeEventListener("message", handleMessage);
  }, [onContinue, onQuestionnaireReceived]);

  return (
    <div className="c-bg-app" style={{ fontFamily: "Inter, sans-serif", height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <style>{fontImport}</style>

            <p className="fs-11 c-faint font-mono text-center px-4">(Creator Bible link not set yet, ask your manager.)</p>

// ---------- persistent login (7 days) ----------
// Uses real browser localStorage since this needs to survive closing the tab/browser.
// Note: localStorage is disabled inside the Claude artifact preview sandbox, so this
// only actually persists once the site is deployed for real (e.g. on GitHub Pages).

const SESSION_KEY = "agencyos_session";
const SESSION_DAYS = 7;

function loadSavedSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed.expiresAt || parsed.expiresAt < Date.now()) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return { role: parsed.role, name: parsed.name, agency: parsed.agency };
  } catch {
    return null;
  }
}

function saveSession(session) {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({
      ...session,
      expiresAt: Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000,
    }));
  } catch {
    // localStorage unavailable (e.g. inside the Claude preview sandbox) — session just won't persist here.
  }
}

function clearSavedSession() {
  try {
    localStorage.removeItem(SESSION_KEY);
  } catch {}
}

              className={`flex-1 minw-64 flex flex-col items-center gap-1 py-2.5 ${activeNav ? "c-accent" : "c-muted"}`}>
              <Icon size={17} />
              <span className="fs-9 font-mono uppercase tracking-wide leading-none text-center px-0.5">{n.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
